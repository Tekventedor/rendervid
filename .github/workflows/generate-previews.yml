name: Generate Example Previews

on:
  push:
    paths:
      - 'examples/**/*.json'
      - 'examples/**/*.ts'
    branches:
      - main

  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Force regenerate all previews'
        required: false
        default: 'false'

jobs:
  generate:
    name: Generate Previews
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome

      - name: Generate previews
        run: pnpm run examples:generate-previews
        env:
          FORCE_REGENERATE: ${{ github.event.inputs.force_regenerate }}

      - name: Check for changes
        id: changes
        run: |
          if [[ -n $(git status --porcelain examples/*/preview.*) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push previews
        if: steps.changes.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: regenerate example previews [skip ci]'
          file_pattern: 'examples/**/preview.* examples/**/thumbnail.*'
          commit_user_name: 'GitHub Actions'
          commit_user_email: 'actions@github.com'
