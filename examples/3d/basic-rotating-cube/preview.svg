<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes title-anim-0 {
      0% { transform: translate(460px, 1930px); opacity: 1; }
      5% { transform: translate(460px, 1775.965px); opacity: 1; }
      10% { transform: translate(460px, 1637.32px); opacity: 1; }
      15% { transform: translate(460px, 1513.255px); opacity: 1; }
      20% { transform: translate(460px, 1402.96px); opacity: 1; }
      25% { transform: translate(460px, 1305.625px); opacity: 1; }
      30% { transform: translate(460px, 1220.44px); opacity: 1; }
      35% { transform: translate(460px, 1146.595px); opacity: 1; }
      40% { transform: translate(460px, 1083.28px); opacity: 1; }
      45% { transform: translate(460px, 1029.685px); opacity: 1; }
      50% { transform: translate(460px, 985px); opacity: 1; }
      55% { transform: translate(460px, 948.415px); opacity: 1; }
      60% { transform: translate(460px, 919.12px); opacity: 1; }
      65% { transform: translate(460px, 896.305px); opacity: 1; }
      70% { transform: translate(460px, 879.16px); opacity: 1; }
      75% { transform: translate(460px, 866.875px); opacity: 1; }
      80% { transform: translate(460px, 858.64px); opacity: 1; }
      85% { transform: translate(460px, 853.645px); opacity: 1; }
      90% { transform: translate(460px, 851.08px); opacity: 1; }
      95% { transform: translate(460px, 850.135px); opacity: 1; }
      100% { transform: translate(460px, 850px); opacity: 1; }
    }
    #title {
      transform-origin: 960px 900px;
      transform: translate(460px, 850px);
      opacity: 1;
      animation: title-anim-0 0.667s 0.667s linear 1 normal forwards;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="{{backgroundColor}}" />
  </g>
  <!-- Unsupported layer type "three" (three-scene) -->
  <g id="title">
    <text y="48" font-family="sans-serif" font-size="48" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle" letter-spacing="4"><tspan x="500" dy="0">BASIC ROTATING CUBE</tspan></text>
  </g>
</svg>