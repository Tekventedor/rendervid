<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="title-shadow"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.5)" /></filter>
    <filter id="subtitle-shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.4)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes title-anim-0 {
      0% { transform: translate(260px, -1000px); opacity: 1; }
      5% { transform: translate(260px, -845.965px); opacity: 1; }
      10% { transform: translate(260px, -707.32px); opacity: 1; }
      15% { transform: translate(260px, -583.255px); opacity: 1; }
      20% { transform: translate(260px, -472.96px); opacity: 1; }
      25% { transform: translate(260px, -375.625px); opacity: 1; }
      30% { transform: translate(260px, -290.44px); opacity: 1; }
      35% { transform: translate(260px, -216.595px); opacity: 1; }
      40% { transform: translate(260px, -153.28px); opacity: 1; }
      45% { transform: translate(260px, -99.685px); opacity: 1; }
      50% { transform: translate(260px, -55px); opacity: 1; }
      55% { transform: translate(260px, -18.415px); opacity: 1; }
      60% { transform: translate(260px, 10.88px); opacity: 1; }
      65% { transform: translate(260px, 33.695px); opacity: 1; }
      70% { transform: translate(260px, 50.84px); opacity: 1; }
      75% { transform: translate(260px, 63.125px); opacity: 1; }
      80% { transform: translate(260px, 71.36px); opacity: 1; }
      85% { transform: translate(260px, 76.355px); opacity: 1; }
      90% { transform: translate(260px, 78.92px); opacity: 1; }
      95% { transform: translate(260px, 79.865px); opacity: 1; }
      100% { transform: translate(260px, 80px); opacity: 1; }
    }
    #title {
      transform-origin: 960px 80px;
      transform: translate(260px, 80px);
      opacity: 1;
      animation: title-anim-0 0.833s 0.5s linear 1 normal forwards;
    }
    @keyframes subtitle-anim-0 {
      0% { transform: translate(360px, 170px); opacity: 0; }
      5% { transform: translate(360px, 170px); opacity: 0.143; }
      10% { transform: translate(360px, 170px); opacity: 0.271; }
      15% { transform: translate(360px, 170px); opacity: 0.386; }
      20% { transform: translate(360px, 170px); opacity: 0.488; }
      25% { transform: translate(360px, 170px); opacity: 0.578; }
      30% { transform: translate(360px, 170px); opacity: 0.657; }
      35% { transform: translate(360px, 170px); opacity: 0.725; }
      40% { transform: translate(360px, 170px); opacity: 0.784; }
      45% { transform: translate(360px, 170px); opacity: 0.834; }
      50% { transform: translate(360px, 170px); opacity: 0.875; }
      55% { transform: translate(360px, 170px); opacity: 0.909; }
      60% { transform: translate(360px, 170px); opacity: 0.936; }
      65% { transform: translate(360px, 170px); opacity: 0.957; }
      70% { transform: translate(360px, 170px); opacity: 0.973; }
      75% { transform: translate(360px, 170px); opacity: 0.984; }
      80% { transform: translate(360px, 170px); opacity: 0.992; }
      85% { transform: translate(360px, 170px); opacity: 0.997; }
      90% { transform: translate(360px, 170px); opacity: 0.999; }
      95% { transform: translate(360px, 170px); opacity: 1; }
      100% { transform: translate(360px, 170px); opacity: 1; }
    }
    #subtitle {
      transform-origin: 960px 170px;
      transform: translate(360px, 170px);
      opacity: 1;
      animation: subtitle-anim-0 0.667s 1.167s linear 1 normal forwards;
    }
    @keyframes feature-box-anim-0 {
      0% { transform: translate(-1820px, 880px); opacity: 1; }
      5% { transform: translate(-1546.16px, 880px); opacity: 1; }
      10% { transform: translate(-1299.68px, 880px); opacity: 1; }
      15% { transform: translate(-1079.12px, 880px); opacity: 1; }
      20% { transform: translate(-883.04px, 880px); opacity: 1; }
      25% { transform: translate(-710px, 880px); opacity: 1; }
      30% { transform: translate(-558.56px, 880px); opacity: 1; }
      35% { transform: translate(-427.28px, 880px); opacity: 1; }
      40% { transform: translate(-314.72px, 880px); opacity: 1; }
      45% { transform: translate(-219.44px, 880px); opacity: 1; }
      50% { transform: translate(-140px, 880px); opacity: 1; }
      55% { transform: translate(-74.96px, 880px); opacity: 1; }
      60% { transform: translate(-22.88px, 880px); opacity: 1; }
      65% { transform: translate(17.68px, 880px); opacity: 1; }
      70% { transform: translate(48.16px, 880px); opacity: 1; }
      75% { transform: translate(70px, 880px); opacity: 1; }
      80% { transform: translate(84.64px, 880px); opacity: 1; }
      85% { transform: translate(93.52px, 880px); opacity: 1; }
      90% { transform: translate(98.08px, 880px); opacity: 1; }
      95% { transform: translate(99.76px, 880px); opacity: 1; }
      100% { transform: translate(100px, 880px); opacity: 1; }
    }
    #feature-box {
      transform-origin: 100px 880px;
      transform: translate(100px, 880px);
      opacity: 1;
      animation: feature-box-anim-0 0.833s 2s linear 1 normal forwards;
    }
    @keyframes features-anim-0 {
      0% { transform: translate(130px, 910px); opacity: 0; }
      5% { transform: translate(130px, 910px); opacity: 0.143; }
      10% { transform: translate(130px, 910px); opacity: 0.271; }
      15% { transform: translate(130px, 910px); opacity: 0.386; }
      20% { transform: translate(130px, 910px); opacity: 0.488; }
      25% { transform: translate(130px, 910px); opacity: 0.578; }
      30% { transform: translate(130px, 910px); opacity: 0.657; }
      35% { transform: translate(130px, 910px); opacity: 0.725; }
      40% { transform: translate(130px, 910px); opacity: 0.784; }
      45% { transform: translate(130px, 910px); opacity: 0.834; }
      50% { transform: translate(130px, 910px); opacity: 0.875; }
      55% { transform: translate(130px, 910px); opacity: 0.909; }
      60% { transform: translate(130px, 910px); opacity: 0.936; }
      65% { transform: translate(130px, 910px); opacity: 0.957; }
      70% { transform: translate(130px, 910px); opacity: 0.973; }
      75% { transform: translate(130px, 910px); opacity: 0.984; }
      80% { transform: translate(130px, 910px); opacity: 0.992; }
      85% { transform: translate(130px, 910px); opacity: 0.997; }
      90% { transform: translate(130px, 910px); opacity: 0.999; }
      95% { transform: translate(130px, 910px); opacity: 1; }
      100% { transform: translate(130px, 910px); opacity: 1; }
    }
    #features {
      transform-origin: 130px 910px;
      transform: translate(130px, 910px);
      opacity: 1;
      animation: features-anim-0 0.667s 2.333s linear 1 normal forwards;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="linear-gradient(135deg, #667eea 0%, #764ba2 100%)" />
  </g>
  <!-- Unsupported layer type "three" (three-scene) -->
  <g id="title">
    <text y="72" font-family="sans-serif" font-size="72" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle" letter-spacing="4" filter="url(#title-shadow)"><tspan x="700" dy="0">MULTI-OBJECT SCENE</tspan></text>
  </g>
  <g id="subtitle">
    <text y="24" font-family="sans-serif" font-size="24" font-weight="normal" font-style="normal" fill="#ffffff" text-anchor="middle" filter="url(#subtitle-shadow)"><tspan x="600" dy="0">7 Different Geometries • Complex Animations • Dynamic Lighting</tspan></text>
  </g>
  <g id="feature-box">
    <rect x="0" y="0" width="500" height="120" rx="0" ry="0" fill="rgba(0, 0, 0, 0.6)" />
  </g>
  <g id="features">
    <text y="20" font-family="sans-serif" font-size="20" font-weight="normal" font-style="normal" fill="#ffffff" text-anchor="start"><tspan x="0" dy="0">• Sphere, Cube, Torus, Cone, Cylinder</tspan><tspan x="0" dy="32">• PBR Materials &amp; Shadows</tspan><tspan x="0" dy="32">• Atmospheric Fog</tspan></text>
  </g>
</svg>