  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="linear-gradient(180deg, #f5f7fa 0%, #c3cfe2 100%)" />
  </g>
  <!-- Unsupported layer type "three" (three-scene) -->
  <g id="title" transform="translate(360, 100)">
    <text y="64" font-family="sans-serif" font-size="64" font-weight="bold" font-style="normal" fill="#1a1a2e" text-anchor="middle" letter-spacing="2"><tspan x="600" dy="0">{{productName}}</tspan></text>
  </g>
  <g id="subtitle" transform="translate(460, 190)">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="normal" font-style="normal" fill="#666666" text-anchor="middle" letter-spacing="1"><tspan x="500" dy="0">Studio Quality 3D Rendering</tspan></text>
  </g>
  <g id="feature-1" transform="translate(100, 850)">
    <text y="22" font-family="sans-serif" font-size="22" font-weight="normal" font-style="normal" fill="#333333" text-anchor="start"><tspan x="0" dy="0">• Physically-Based Rendering</tspan><tspan x="0" dy="39.6">• Real-time Shadows</tspan><tspan x="0" dy="39.6">• HDR Tone Mapping</tspan></text>
  </g>
  <g id="cta" transform="translate(1420, 900)">
    <rect x="0" y="0" width="400" height="80" rx="0" ry="0" fill="#4c00ff" />
  </g>
  <g id="cta-text" transform="translate(1430, 900)">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="190" dy="0">Learn More</tspan></text>
  </g>
