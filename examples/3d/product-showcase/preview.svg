  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="linear-gradient(180deg, #f5f7fa 0%, #c3cfe2 100%)" />
  </g>
  <!-- Unsupported layer type "three" (three-scene) -->
  <g id="title">
    <text y="64" font-family="sans-serif" font-size="64" font-weight="bold" font-style="normal" fill="#1a1a2e" text-anchor="middle" letter-spacing="2"><tspan x="600" dy="0">{{productName}}</tspan></text>
  </g>
  <g id="subtitle">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="normal" font-style="normal" fill="#666666" text-anchor="middle" letter-spacing="1"><tspan x="500" dy="0">Studio Quality 3D Rendering</tspan></text>
  </g>
  <g id="feature-1">
