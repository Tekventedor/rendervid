<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #bg-gradient-1 {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.1;
    }
    #bg-gradient-2 {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.08;
    }
    @keyframes title-anim-0 {
      0% { transform: translate(0px, -1080px); }
      5% { transform: translate(0px, -974.7px); }
      10% { transform: translate(0px, -874.8px); }
      15% { transform: translate(0px, -780.3px); }
      20% { transform: translate(0px, -691.2px); }
      25% { transform: translate(0px, -607.5px); }
      30% { transform: translate(0px, -529.2px); }
      35% { transform: translate(0px, -456.3px); }
      40% { transform: translate(0px, -388.8px); }
      45% { transform: translate(0px, -326.7px); }
      50% { transform: translate(0px, -270px); }
      55% { transform: translate(0px, -218.7px); }
      60% { transform: translate(0px, -172.8px); }
      65% { transform: translate(0px, -132.3px); }
      70% { transform: translate(0px, -97.2px); }
      75% { transform: translate(0px, -67.5px); }
      80% { transform: translate(0px, -43.2px); }
      85% { transform: translate(0px, -24.3px); }
      90% { transform: translate(0px, -10.8px); }
      95% { transform: translate(0px, -2.7px); }
      100% { transform: translate(0px, 0px); }
    }
    #title {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: title-anim-0 0.833s 0.667s linear 1 normal forwards;
    }
    @keyframes title-accent-anim-0 {
      0% { transform: scale(0, 0); opacity: 0; }
      5% { transform: scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: scale(1, 1); opacity: 1; }
      100% { transform: scale(1, 1); opacity: 1; }
    }
    #title-accent {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: title-accent-anim-0 0.667s 1.333s linear 1 normal forwards;
    }
    @keyframes subtitle-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #subtitle {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: subtitle-anim-0 0.667s 1.5s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#0a0a0f" />
  </g>
  <g id="bg-gradient-1" transform="translate(-100, -100)">
    <rect width="800" height="800" fill="{{accentColor}}" />
  </g>
  <g id="bg-gradient-2" transform="translate(1220, 380)">
    <rect width="600" height="600" fill="{{sphereColor}}" />
  </g>
  <!-- Unsupported layer type "custom" (three-scene) -->
  <g id="title" transform="translate(360, 120)">
    <text y="84" font-family="sans-serif" font-size="84" font-weight="900" font-style="normal" fill="#ffffff" text-anchor="middle" letter-spacing="12"><tspan x="600" dy="0">{{title}}</tspan></text>
  </g>
  <g id="title-accent" transform="translate(860, 205)">
    <rect x="0" y="0" width="200" height="4" rx="0" ry="0" fill="{{accentColor}}" />
  </g>
  <g id="subtitle" transform="translate(560, 880)">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="300" font-style="normal" fill="{{sphereColor}}" text-anchor="middle" letter-spacing="4"><tspan x="400" dy="0">{{subtitle}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>