<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #bg-color {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #bg-shape-1 {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.2;
    }
    #bg-shape-2 {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.3;
    }
    #midground-shape {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.4;
    }
    @keyframes foreground-bar-anim-0 {
      0% { transform: translate(0px, 1080px); }
      5% { transform: translate(0px, 925.965px); }
      10% { transform: translate(0px, 787.32px); }
      15% { transform: translate(0px, 663.255px); }
      20% { transform: translate(0px, 552.96px); }
      25% { transform: translate(0px, 455.625px); }
      30% { transform: translate(0px, 370.44px); }
      35% { transform: translate(0px, 296.595px); }
      40% { transform: translate(0px, 233.28px); }
      45% { transform: translate(0px, 179.685px); }
      50% { transform: translate(0px, 135px); }
      55% { transform: translate(0px, 98.415px); }
      60% { transform: translate(0px, 69.12px); }
      65% { transform: translate(0px, 46.305px); }
      70% { transform: translate(0px, 29.16px); }
      75% { transform: translate(0px, 16.875px); }
      80% { transform: translate(0px, 8.64px); }
      85% { transform: translate(0px, 3.645px); }
      90% { transform: translate(0px, 1.08px); }
      95% { transform: translate(0px, 0.135px); }
      100% { transform: translate(0px, 0px); }
    }
    #foreground-bar {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.9;
      animation: foreground-bar-anim-0 1s 1s linear 1 normal forwards;
    }
    @keyframes title-anim-0 {
      0% { transform: scale(0, 0); opacity: 0; }
      5% { transform: scale(0.219, 0.219); opacity: 0.219; }
      10% { transform: scale(0.409, 0.409); opacity: 0.409; }
      15% { transform: scale(0.57, 0.57); opacity: 0.57; }
      20% { transform: scale(0.706, 0.706); opacity: 0.706; }
      25% { transform: scale(0.817, 0.817); opacity: 0.817; }
      30% { transform: scale(0.907, 0.907); opacity: 0.907; }
      35% { transform: scale(0.977, 0.977); opacity: 0.977; }
      40% { transform: scale(1.029, 1.029); opacity: 1.029; }
      45% { transform: scale(1.065, 1.065); opacity: 1.065; }
      50% { transform: scale(1.088, 1.088); opacity: 1.088; }
      55% { transform: scale(1.098, 1.098); opacity: 1.098; }
      60% { transform: scale(1.099, 1.099); opacity: 1.099; }
      65% { transform: scale(1.093, 1.093); opacity: 1.093; }
      70% { transform: scale(1.08, 1.08); opacity: 1.08; }
      75% { transform: scale(1.064, 1.064); opacity: 1.064; }
      80% { transform: scale(1.046, 1.046); opacity: 1.046; }
      85% { transform: scale(1.029, 1.029); opacity: 1.029; }
      90% { transform: scale(1.014, 1.014); opacity: 1.014; }
      95% { transform: scale(1.004, 1.004); opacity: 1.004; }
      100% { transform: scale(1, 1); opacity: 1; }
    }
    #title {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: title-anim-0 1s 0.5s linear 1 normal forwards;
    }
    @keyframes subtitle-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #subtitle {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: subtitle-anim-0 0.833s 1.167s linear 1 normal forwards;
    }
    @keyframes cta-anim-0 {
      0% { transform: translate(0px, 1080px); }
      5% { transform: translate(0px, 925.965px); }
      10% { transform: translate(0px, 787.32px); }
      15% { transform: translate(0px, 663.255px); }
      20% { transform: translate(0px, 552.96px); }
      25% { transform: translate(0px, 455.625px); }
      30% { transform: translate(0px, 370.44px); }
      35% { transform: translate(0px, 296.595px); }
      40% { transform: translate(0px, 233.28px); }
      45% { transform: translate(0px, 179.685px); }
      50% { transform: translate(0px, 135px); }
      55% { transform: translate(0px, 98.415px); }
      60% { transform: translate(0px, 69.12px); }
      65% { transform: translate(0px, 46.305px); }
      70% { transform: translate(0px, 29.16px); }
      75% { transform: translate(0px, 16.875px); }
      80% { transform: translate(0px, 8.64px); }
      85% { transform: translate(0px, 3.645px); }
      90% { transform: translate(0px, 1.08px); }
      95% { transform: translate(0px, 0.135px); }
      100% { transform: translate(0px, 0px); }
    }
    #cta {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: cta-anim-0 0.833s 1.5s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="bg-color" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#1a1a2e" />
  </g>
  <g id="bg-shape-1" transform="translate(-200, 600)">
    <rect x="0" y="0" width="800" height="500" rx="0" ry="0" fill="#16213e" />
  </g>
  <g id="bg-shape-2" transform="translate(1400, 400)">
    <rect x="0" y="0" width="600" height="600" rx="0" ry="0" fill="#0f3460" />
  </g>
  <g id="midground-shape" transform="translate(200, 300)">
    <rect x="0" y="0" width="500" height="500" rx="0" ry="0" fill="#16213e" />
  </g>
  <g id="foreground-bar" transform="translate(0, 950)">
    <rect x="0" y="0" width="1920" height="150" rx="0" ry="0" fill="{{accentColor}}" />
  </g>
  <g id="title" transform="translate(260, 400)">
    <text y="96" font-family="sans-serif" font-size="96" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="700" dy="0">{{title}}</tspan></text>
  </g>
  <g id="subtitle" transform="translate(360, 520)">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="normal" font-style="normal" fill="#e2e8f0" text-anchor="middle"><tspan x="600" dy="0">{{subtitle}}</tspan></text>
  </g>
  <g id="cta" transform="translate(560, 990)">
    <text y="32" font-family="sans-serif" font-size="32" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="400" dy="0">{{ctaText}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>