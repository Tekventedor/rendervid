<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="title-shadow"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(102, 126, 234, 0.8)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes title-anim-0 {
      0% { transform: translate(460px, 440px); opacity: 0; }
      5% { transform: translate(460px, 440px); opacity: 0.143; }
      10% { transform: translate(460px, 440px); opacity: 0.271; }
      15% { transform: translate(460px, 440px); opacity: 0.386; }
      20% { transform: translate(460px, 440px); opacity: 0.488; }
      25% { transform: translate(460px, 440px); opacity: 0.578; }
      30% { transform: translate(460px, 440px); opacity: 0.657; }
      35% { transform: translate(460px, 440px); opacity: 0.725; }
      40% { transform: translate(460px, 440px); opacity: 0.784; }
      45% { transform: translate(460px, 440px); opacity: 0.834; }
      50% { transform: translate(460px, 440px); opacity: 0.875; }
      55% { transform: translate(460px, 440px); opacity: 0.909; }
      60% { transform: translate(460px, 440px); opacity: 0.936; }
      65% { transform: translate(460px, 440px); opacity: 0.957; }
      70% { transform: translate(460px, 440px); opacity: 0.973; }
      75% { transform: translate(460px, 440px); opacity: 0.984; }
      80% { transform: translate(460px, 440px); opacity: 0.992; }
      85% { transform: translate(460px, 440px); opacity: 0.997; }
      90% { transform: translate(460px, 440px); opacity: 0.999; }
      95% { transform: translate(460px, 440px); opacity: 1; }
      100% { transform: translate(460px, 440px); opacity: 1; }
    }
    #title {
      transform-origin: 460px 440px;
      transform: translate(460px, 440px);
      opacity: 1;
      animation: title-anim-0 1.5s 1s linear 1 normal forwards;
    }
    @keyframes subtitle-anim-0 {
      0% { transform: translate(560px, 1660px); opacity: 1; }
      5% { transform: translate(560px, 1505.965px); opacity: 1; }
      10% { transform: translate(560px, 1367.32px); opacity: 1; }
      15% { transform: translate(560px, 1243.255px); opacity: 1; }
      20% { transform: translate(560px, 1132.96px); opacity: 1; }
      25% { transform: translate(560px, 1035.625px); opacity: 1; }
      30% { transform: translate(560px, 950.44px); opacity: 1; }
      35% { transform: translate(560px, 876.595px); opacity: 1; }
      40% { transform: translate(560px, 813.28px); opacity: 1; }
      45% { transform: translate(560px, 759.685px); opacity: 1; }
      50% { transform: translate(560px, 715px); opacity: 1; }
      55% { transform: translate(560px, 678.415px); opacity: 1; }
      60% { transform: translate(560px, 649.12px); opacity: 1; }
      65% { transform: translate(560px, 626.305px); opacity: 1; }
      70% { transform: translate(560px, 609.16px); opacity: 1; }
      75% { transform: translate(560px, 596.875px); opacity: 1; }
      80% { transform: translate(560px, 588.64px); opacity: 1; }
      85% { transform: translate(560px, 583.645px); opacity: 1; }
      90% { transform: translate(560px, 581.08px); opacity: 1; }
      95% { transform: translate(560px, 580.135px); opacity: 1; }
      100% { transform: translate(560px, 580px); opacity: 1; }
    }
    #subtitle {
      transform-origin: 560px 580px;
      transform: translate(560px, 580px);
      opacity: 1;
      animation: subtitle-anim-0 1s 2s linear 1 normal forwards;
    }
    @keyframes accent-line-anim-0 {
      0% { transform: translate(860px, 620px) scale(0, 0); opacity: 0; }
      5% { transform: translate(860px, 620px) scale(0.219, 0.219); opacity: 0.219; }
      10% { transform: translate(860px, 620px) scale(0.409, 0.409); opacity: 0.409; }
      15% { transform: translate(860px, 620px) scale(0.57, 0.57); opacity: 0.57; }
      20% { transform: translate(860px, 620px) scale(0.706, 0.706); opacity: 0.706; }
      25% { transform: translate(860px, 620px) scale(0.817, 0.817); opacity: 0.817; }
      30% { transform: translate(860px, 620px) scale(0.907, 0.907); opacity: 0.907; }
      35% { transform: translate(860px, 620px) scale(0.977, 0.977); opacity: 0.977; }
      40% { transform: translate(860px, 620px) scale(1.029, 1.029); opacity: 1.029; }
      45% { transform: translate(860px, 620px) scale(1.065, 1.065); opacity: 1.065; }
      50% { transform: translate(860px, 620px) scale(1.088, 1.088); opacity: 1.088; }
      55% { transform: translate(860px, 620px) scale(1.098, 1.098); opacity: 1.098; }
      60% { transform: translate(860px, 620px) scale(1.099, 1.099); opacity: 1.099; }
      65% { transform: translate(860px, 620px) scale(1.093, 1.093); opacity: 1.093; }
      70% { transform: translate(860px, 620px) scale(1.08, 1.08); opacity: 1.08; }
      75% { transform: translate(860px, 620px) scale(1.064, 1.064); opacity: 1.064; }
      80% { transform: translate(860px, 620px) scale(1.046, 1.046); opacity: 1.046; }
      85% { transform: translate(860px, 620px) scale(1.029, 1.029); opacity: 1.029; }
      90% { transform: translate(860px, 620px) scale(1.014, 1.014); opacity: 1.014; }
      95% { transform: translate(860px, 620px) scale(1.004, 1.004); opacity: 1.004; }
      100% { transform: translate(860px, 620px); opacity: 1; }
    }
    #accent-line {
      transform-origin: 860px 620px;
      transform: translate(860px, 620px);
      opacity: 1;
      animation: accent-line-anim-0 0.667s 3s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#0a0a1f" />
  </g>
  <!-- Unsupported layer type "custom" (aurora) -->
  <g id="title">
    <text y="96" font-family="sans-serif" font-size="96" font-weight="900" font-style="normal" fill="#ffffff" text-anchor="middle" letter-spacing="12" filter="url(#title-shadow)"><tspan x="500" dy="0">{{title}}</tspan></text>
  </g>
  <g id="subtitle">
    <text y="32" font-family="sans-serif" font-size="32" font-weight="300" font-style="normal" fill="#e0e0e0" text-anchor="middle" letter-spacing="6"><tspan x="400" dy="0">{{subtitle}}</tspan></text>
  </g>
  <g id="accent-line">
    <rect x="0" y="0" width="200" height="3" rx="0" ry="0" fill="#667eea" />
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>