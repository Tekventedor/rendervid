<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="title-shadow"><feDropShadow dx="0" dy="4" stdDeviation="15" flood-color="rgba(6, 182, 212, 0.8)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes title-anim-0 {
      0% { transform: translate(360px, 420px); opacity: 0; }
      5% { transform: translate(360px, 420px); opacity: 0.143; }
      10% { transform: translate(360px, 420px); opacity: 0.271; }
      15% { transform: translate(360px, 420px); opacity: 0.386; }
      20% { transform: translate(360px, 420px); opacity: 0.488; }
      25% { transform: translate(360px, 420px); opacity: 0.578; }
      30% { transform: translate(360px, 420px); opacity: 0.657; }
      35% { transform: translate(360px, 420px); opacity: 0.725; }
      40% { transform: translate(360px, 420px); opacity: 0.784; }
      45% { transform: translate(360px, 420px); opacity: 0.834; }
      50% { transform: translate(360px, 420px); opacity: 0.875; }
      55% { transform: translate(360px, 420px); opacity: 0.909; }
      60% { transform: translate(360px, 420px); opacity: 0.936; }
      65% { transform: translate(360px, 420px); opacity: 0.957; }
      70% { transform: translate(360px, 420px); opacity: 0.973; }
      75% { transform: translate(360px, 420px); opacity: 0.984; }
      80% { transform: translate(360px, 420px); opacity: 0.992; }
      85% { transform: translate(360px, 420px); opacity: 0.997; }
      90% { transform: translate(360px, 420px); opacity: 0.999; }
      95% { transform: translate(360px, 420px); opacity: 1; }
      100% { transform: translate(360px, 420px); opacity: 1; }
    }
    #title {
      transform-origin: 360px 420px;
      transform: translate(360px, 420px);
      opacity: 1;
      animation: title-anim-0 1.333s 1s linear 1 normal forwards;
    }
    @keyframes subtitle-anim-0 {
      0% { transform: translate(560px, 1680px); opacity: 1; }
      5% { transform: translate(560px, 1525.965px); opacity: 1; }
      10% { transform: translate(560px, 1387.32px); opacity: 1; }
      15% { transform: translate(560px, 1263.255px); opacity: 1; }
      20% { transform: translate(560px, 1152.96px); opacity: 1; }
      25% { transform: translate(560px, 1055.625px); opacity: 1; }
      30% { transform: translate(560px, 970.44px); opacity: 1; }
      35% { transform: translate(560px, 896.595px); opacity: 1; }
      40% { transform: translate(560px, 833.28px); opacity: 1; }
      45% { transform: translate(560px, 779.685px); opacity: 1; }
      50% { transform: translate(560px, 735px); opacity: 1; }
      55% { transform: translate(560px, 698.415px); opacity: 1; }
      60% { transform: translate(560px, 669.12px); opacity: 1; }
      65% { transform: translate(560px, 646.305px); opacity: 1; }
      70% { transform: translate(560px, 629.16px); opacity: 1; }
      75% { transform: translate(560px, 616.875px); opacity: 1; }
      80% { transform: translate(560px, 608.64px); opacity: 1; }
      85% { transform: translate(560px, 603.645px); opacity: 1; }
      90% { transform: translate(560px, 601.08px); opacity: 1; }
      95% { transform: translate(560px, 600.135px); opacity: 1; }
      100% { transform: translate(560px, 600px); opacity: 1; }
    }
    #subtitle {
      transform-origin: 560px 600px;
      transform: translate(560px, 600px);
      opacity: 1;
      animation: subtitle-anim-0 1s 2s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#0a1929" />
  </g>
  <!-- Unsupported layer type "custom" (wave-background) -->
  <g id="title">
    <text y="110" font-family="sans-serif" font-size="110" font-weight="900" font-style="normal" fill="#ffffff" text-anchor="middle" letter-spacing="18" filter="url(#title-shadow)"><tspan x="600" dy="0">{{title}}</tspan></text>
  </g>
  <g id="subtitle">
    <text y="42" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="300" font-style="normal" fill="#7dd3fc" text-anchor="middle" letter-spacing="6"><tspan x="400" dy="0">{{subtitle}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>