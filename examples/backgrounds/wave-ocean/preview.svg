<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="title-shadow"><feDropShadow dx="0" dy="4" stdDeviation="15" flood-color="rgba(6, 182, 212, 0.8)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes title-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #title {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: title-anim-0 1.333s 1s linear 1 normal forwards;
    }
    @keyframes subtitle-anim-0 {
      0% { transform: translate(0px, 1080px); }
      5% { transform: translate(0px, 925.965px); }
      10% { transform: translate(0px, 787.32px); }
      15% { transform: translate(0px, 663.255px); }
      20% { transform: translate(0px, 552.96px); }
      25% { transform: translate(0px, 455.625px); }
      30% { transform: translate(0px, 370.44px); }
      35% { transform: translate(0px, 296.595px); }
      40% { transform: translate(0px, 233.28px); }
      45% { transform: translate(0px, 179.685px); }
      50% { transform: translate(0px, 135px); }
      55% { transform: translate(0px, 98.415px); }
      60% { transform: translate(0px, 69.12px); }
      65% { transform: translate(0px, 46.305px); }
      70% { transform: translate(0px, 29.16px); }
      75% { transform: translate(0px, 16.875px); }
      80% { transform: translate(0px, 8.64px); }
      85% { transform: translate(0px, 3.645px); }
      90% { transform: translate(0px, 1.08px); }
      95% { transform: translate(0px, 0.135px); }
      100% { transform: translate(0px, 0px); }
    }
    #subtitle {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: subtitle-anim-0 1s 2s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#0a1929" />
  </g>
  <!-- Unsupported layer type "custom" (wave-background) -->
  <g id="title" transform="translate(360, 420)">
    <text y="110" font-family="sans-serif" font-size="110" font-weight="900" font-style="normal" fill="#ffffff" text-anchor="middle" letter-spacing="18" filter="url(#title-shadow)"><tspan x="600" dy="0">{{title}}</tspan></text>
  </g>
  <g id="subtitle" transform="translate(560, 600)">
    <text y="42" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="300" font-style="normal" fill="#7dd3fc" text-anchor="middle" letter-spacing="6"><tspan x="400" dy="0">{{subtitle}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>