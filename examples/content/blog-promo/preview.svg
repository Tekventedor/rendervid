      75% { transform: translate(0px, 0px) scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: translate(0px, 0px) scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: translate(0px, 0px) scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: translate(0px, 0px) scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: translate(0px, 0px) scale(1, 1); opacity: 1; }
      100% { transform: translate(0px, 0px); opacity: 1; }
    }
    #featured-image {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: featured-image-anim-0 0.833s 0.167s linear 1 normal forwards;
