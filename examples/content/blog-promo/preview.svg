      55% { transform: translate(100px, 660px); opacity: 0.909; }
      60% { transform: translate(100px, 660px); opacity: 0.936; }
      65% { transform: translate(100px, 660px); opacity: 0.957; }
      70% { transform: translate(100px, 660px); opacity: 0.973; }
      75% { transform: translate(100px, 660px); opacity: 0.984; }
      80% { transform: translate(100px, 660px); opacity: 0.992; }
