      15% { transform: translate(0px, 0px) scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: translate(0px, 0px) scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: translate(0px, 0px) scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: translate(0px, 0px) scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: translate(0px, 0px) scale(0.725, 0.725); opacity: 0.725; }
