      65% { transform: translate(17.68px, 980px); opacity: 1; }
      70% { transform: translate(48.16px, 980px); opacity: 1; }
      75% { transform: translate(70px, 980px); opacity: 1; }
      80% { transform: translate(84.64px, 980px); opacity: 1; }
      85% { transform: translate(93.52px, 980px); opacity: 1; }
      90% { transform: translate(98.08px, 980px); opacity: 1; }
      95% { transform: translate(99.76px, 980px); opacity: 1; }
      100% { transform: translate(100px, 980px); opacity: 1; }
