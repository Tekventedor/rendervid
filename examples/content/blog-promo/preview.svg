  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#ffffff" />
  </g>
  <g id="featured-image">
    <image href="{{featuredImage}}" width="1920" height="600" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="content-bg" transform="translate(0, 600)">
    <rect x="0" y="0" width="1920" height="480" rx="0" ry="0" fill="#ffffff" />
  </g>
  <g id="category">
    <text y="20" font-family="sans-serif" font-size="20" font-weight="600" font-style="normal" fill="#3b82f6" text-anchor="start"><tspan x="0" dy="0">{{category}}</tspan></text>
  </g>
  <g id="title">
    <text y="56" font-family="sans-serif" font-size="56" font-weight="bold" font-style="normal" fill="#1f2937" text-anchor="start"><tspan x="0" dy="0">{{title}}</tspan></text>
  </g>
  <g id="excerpt">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="start"><tspan x="0" dy="0">{{excerpt}}</tspan></text>
  </g>
  <g id="cta">
    <text y="24" font-family="sans-serif" font-size="24" font-weight="600" font-style="normal" fill="#3b82f6" text-anchor="start"><tspan x="0" dy="0">{{cta}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
