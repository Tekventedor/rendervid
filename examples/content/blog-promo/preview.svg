      60% { transform: translate(100px, 809.12px); opacity: 1; }
      65% { transform: translate(100px, 786.305px); opacity: 1; }
      70% { transform: translate(100px, 769.16px); opacity: 1; }
      75% { transform: translate(100px, 756.875px); opacity: 1; }
      80% { transform: translate(100px, 748.64px); opacity: 1; }
      85% { transform: translate(100px, 743.645px); opacity: 1; }
      90% { transform: translate(100px, 741.08px); opacity: 1; }
      95% { transform: translate(100px, 740.135px); opacity: 1; }
      100% { transform: translate(100px, 740px); opacity: 1; }
    }
    #title {
      transform-origin: 100px 740px;
      transform: translate(100px, 740px);
      opacity: 1;
      animation: title-anim-0 0.833s 1s linear 1 normal forwards;
