      10% { transform: translate(100px, 880px); opacity: 0.271; }
      15% { transform: translate(100px, 880px); opacity: 0.386; }
      20% { transform: translate(100px, 880px); opacity: 0.488; }
      25% { transform: translate(100px, 880px); opacity: 0.578; }
      30% { transform: translate(100px, 880px); opacity: 0.657; }
      35% { transform: translate(100px, 880px); opacity: 0.725; }
      40% { transform: translate(100px, 880px); opacity: 0.784; }
      45% { transform: translate(100px, 880px); opacity: 0.834; }
