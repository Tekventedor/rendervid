  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#0f172a" />
  </g>
  <g id="featured-image">
    <image href="{{featuredImage}}" width="1920" height="600" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="top-bar">
    <rect x="0" y="0" width="1920" height="80" rx="0" ry="0" fill="#dc2626" />
  </g>
  <g id="badge">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="200" dy="0">{{badge}}</tspan></text>
  </g>
  <g id="headline-bg">
    <rect x="0" y="0" width="1720" height="250" rx="0" ry="0" fill="#000000" />
  </g>
  <g id="headline">
    <text y="64" font-family="sans-serif" font-size="64" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="800" dy="0">{{headline}}</tspan></text>
  </g>
  <g id="subheadline">
