      75% { transform: translate(90px, 720px); opacity: 0.984; }
      80% { transform: translate(90px, 720px); opacity: 0.992; }
      85% { transform: translate(90px, 720px); opacity: 0.997; }
      90% { transform: translate(90px, 720px); opacity: 0.999; }
