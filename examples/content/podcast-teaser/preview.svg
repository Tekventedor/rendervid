<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <rect width="1080" height="1080" fill="#000000" />
  <defs>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes podcast-image-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #podcast-image {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.4;
      animation: podcast-image-anim-0 1s 0s linear 1 normal forwards;
    }
    @keyframes waveform-bg-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #waveform-bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.3;
      animation: waveform-bg-anim-0 0.833s 1s linear 1 normal forwards;
    }
    @keyframes podcast-name-anim-0 {
      0% { transform: translate(0px, 1080px); }
      5% { transform: translate(0px, 925.965px); }
      10% { transform: translate(0px, 787.32px); }
      15% { transform: translate(0px, 663.255px); }
      20% { transform: translate(0px, 552.96px); }
      25% { transform: translate(0px, 455.625px); }
      30% { transform: translate(0px, 370.44px); }
      35% { transform: translate(0px, 296.595px); }
      40% { transform: translate(0px, 233.28px); }
      45% { transform: translate(0px, 179.685px); }
      50% { transform: translate(0px, 135px); }
      55% { transform: translate(0px, 98.415px); }
      60% { transform: translate(0px, 69.12px); }
      65% { transform: translate(0px, 46.305px); }
      70% { transform: translate(0px, 29.16px); }
      75% { transform: translate(0px, 16.875px); }
      80% { transform: translate(0px, 8.64px); }
      85% { transform: translate(0px, 3.645px); }
      90% { transform: translate(0px, 1.08px); }
      95% { transform: translate(0px, 0.135px); }
      100% { transform: translate(0px, 0px); }
    }
    #podcast-name {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: podcast-name-anim-0 0.833s 1.333s linear 1 normal forwards;
    }
    @keyframes episode-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #episode {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: episode-anim-0 0.833s 1.667s linear 1 normal forwards;
    }
    @keyframes guest-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #guest {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: guest-anim-0 0.833s 2s linear 1 normal forwards;
    }
    @keyframes cta-anim-0 {
      0% { transform: translate(0px, 1080px); }
      5% { transform: translate(0px, 925.965px); }
      10% { transform: translate(0px, 787.32px); }
      15% { transform: translate(0px, 663.255px); }
      20% { transform: translate(0px, 552.96px); }
      25% { transform: translate(0px, 455.625px); }
      30% { transform: translate(0px, 370.44px); }
      35% { transform: translate(0px, 296.595px); }
      40% { transform: translate(0px, 233.28px); }
      45% { transform: translate(0px, 179.685px); }
      50% { transform: translate(0px, 135px); }
      55% { transform: translate(0px, 98.415px); }
      60% { transform: translate(0px, 69.12px); }
      65% { transform: translate(0px, 46.305px); }
      70% { transform: translate(0px, 29.16px); }
      75% { transform: translate(0px, 16.875px); }
      80% { transform: translate(0px, 8.64px); }
      85% { transform: translate(0px, 3.645px); }
      90% { transform: translate(0px, 1.08px); }
      95% { transform: translate(0px, 0.135px); }
      100% { transform: translate(0px, 0px); }
    }
    #cta {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: cta-anim-0 0.833s 2.333s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1080" height="1080" rx="0" ry="0" fill="#18181b" />
  </g>
  <g id="podcast-image" transform="translate(0, 0)">
    <image href="{{podcastImage}}" width="1080" height="450" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="waveform-bg" transform="translate(90, 480)">
    <rect x="0" y="0" width="900" height="80" rx="0" ry="0" fill="#3b82f6" />
  </g>
  <g id="podcast-name" transform="translate(90, 620)">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="600" font-style="normal" fill="#3b82f6" text-anchor="middle"><tspan x="450" dy="0">{{podcastName}}</tspan></text>
  </g>
  <g id="episode" transform="translate(90, 720)">
    <text y="42" font-family="sans-serif" font-size="42" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="450" dy="0">{{episodeTitle}}</tspan></text>
  </g>
  <g id="guest" transform="translate(140, 860)">
    <text y="26" font-family="sans-serif" font-size="26" font-weight="normal" font-style="normal" fill="#a1a1aa" text-anchor="middle"><tspan x="400" dy="0">{{guestName}}</tspan></text>
  </g>
  <g id="cta" transform="translate(240, 980)">
    <text y="24" font-family="sans-serif" font-size="24" font-weight="600" font-style="normal" fill="#3b82f6" text-anchor="middle"><tspan x="300" dy="0">{{cta}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>