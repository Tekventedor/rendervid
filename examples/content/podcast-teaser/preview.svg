      15% { transform: translate(140px, 860px); opacity: 0.386; }
      20% { transform: translate(140px, 860px); opacity: 0.488; }
      25% { transform: translate(140px, 860px); opacity: 0.578; }
      30% { transform: translate(140px, 860px); opacity: 0.657; }
      35% { transform: translate(140px, 860px); opacity: 0.725; }
      40% { transform: translate(140px, 860px); opacity: 0.784; }
      45% { transform: translate(140px, 860px); opacity: 0.834; }
      50% { transform: translate(140px, 860px); opacity: 0.875; }
      55% { transform: translate(140px, 860px); opacity: 0.909; }
      60% { transform: translate(140px, 860px); opacity: 0.936; }
      65% { transform: translate(140px, 860px); opacity: 0.957; }
      70% { transform: translate(140px, 860px); opacity: 0.973; }
      75% { transform: translate(140px, 860px); opacity: 0.984; }
      80% { transform: translate(140px, 860px); opacity: 0.992; }
