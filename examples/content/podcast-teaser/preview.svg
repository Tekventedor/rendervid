      transform-origin: 140px 860px;
      transform: translate(140px, 860px);
      opacity: 1;
      animation: guest-anim-0 0.833s 2s linear 1 normal forwards;
    }
    @keyframes cta-anim-0 {
      0% { transform: translate(240px, 2060px); opacity: 1; }
      5% { transform: translate(240px, 1905.965px); opacity: 1; }
      10% { transform: translate(240px, 1767.32px); opacity: 1; }
      15% { transform: translate(240px, 1643.255px); opacity: 1; }
      20% { transform: translate(240px, 1532.96px); opacity: 1; }
      25% { transform: translate(240px, 1435.625px); opacity: 1; }
      30% { transform: translate(240px, 1350.44px); opacity: 1; }
      35% { transform: translate(240px, 1276.595px); opacity: 1; }
      40% { transform: translate(240px, 1213.28px); opacity: 1; }
      45% { transform: translate(240px, 1159.685px); opacity: 1; }
      50% { transform: translate(240px, 1115px); opacity: 1; }
      55% { transform: translate(240px, 1078.415px); opacity: 1; }
      60% { transform: translate(240px, 1049.12px); opacity: 1; }
      65% { transform: translate(240px, 1026.305px); opacity: 1; }
      70% { transform: translate(240px, 1009.16px); opacity: 1; }
      75% { transform: translate(240px, 996.875px); opacity: 1; }
      80% { transform: translate(240px, 988.64px); opacity: 1; }
      85% { transform: translate(240px, 983.645px); opacity: 1; }
      90% { transform: translate(240px, 981.08px); opacity: 1; }
      95% { transform: translate(240px, 980.135px); opacity: 1; }
      100% { transform: translate(240px, 980px); opacity: 1; }
    }
    #cta {
      transform-origin: 240px 980px;
      transform: translate(240px, 980px);
      opacity: 1;
      animation: cta-anim-0 0.833s 2.333s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1080" height="1080" rx="0" ry="0" fill="#18181b" />
  </g>
  <g id="podcast-image">
    <image href="{{podcastImage}}" width="1080" height="450" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="waveform-bg">
    <rect x="0" y="0" width="900" height="80" rx="0" ry="0" fill="#3b82f6" />
  </g>
  <g id="podcast-name">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="600" font-style="normal" fill="#3b82f6" text-anchor="middle"><tspan x="450" dy="0">{{podcastName}}</tspan></text>
  </g>
  <g id="episode">
    <text y="42" font-family="sans-serif" font-size="42" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="450" dy="0">{{episodeTitle}}</tspan></text>
  </g>
  <g id="guest">
    <text y="26" font-family="sans-serif" font-size="26" font-weight="normal" font-style="normal" fill="#a1a1aa" text-anchor="middle"><tspan x="400" dy="0">{{guestName}}</tspan></text>
  </g>
  <g id="cta">
    <text y="24" font-family="sans-serif" font-size="24" font-weight="600" font-style="normal" fill="#3b82f6" text-anchor="middle"><tspan x="300" dy="0">{{cta}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>