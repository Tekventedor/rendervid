      35% { transform: translate(90px, 916.595px); opacity: 1; }
      40% { transform: translate(90px, 853.28px); opacity: 1; }
      45% { transform: translate(90px, 799.685px); opacity: 1; }
      50% { transform: translate(90px, 755px); opacity: 1; }
      55% { transform: translate(90px, 718.415px); opacity: 1; }
      60% { transform: translate(90px, 689.12px); opacity: 1; }
      65% { transform: translate(90px, 666.305px); opacity: 1; }
      70% { transform: translate(90px, 649.16px); opacity: 1; }
      75% { transform: translate(90px, 636.875px); opacity: 1; }
      80% { transform: translate(90px, 628.64px); opacity: 1; }
      85% { transform: translate(90px, 623.645px); opacity: 1; }
