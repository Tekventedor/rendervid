      10% { transform: translate(0px, 0px); opacity: 0.108; }
      15% { transform: translate(0px, 0px); opacity: 0.154; }
      20% { transform: translate(0px, 0px); opacity: 0.195; }
      25% { transform: translate(0px, 0px); opacity: 0.231; }
      30% { transform: translate(0px, 0px); opacity: 0.263; }
      35% { transform: translate(0px, 0px); opacity: 0.29; }
      40% { transform: translate(0px, 0px); opacity: 0.314; }
      45% { transform: translate(0px, 0px); opacity: 0.333; }
      50% { transform: translate(0px, 0px); opacity: 0.35; }
      55% { transform: translate(0px, 0px); opacity: 0.364; }
      60% { transform: translate(0px, 0px); opacity: 0.374; }
      65% { transform: translate(0px, 0px); opacity: 0.383; }
      70% { transform: translate(0px, 0px); opacity: 0.389; }
