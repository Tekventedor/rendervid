    #subtitle {
      transform-origin: 500px 50px;
      transform: none;
      opacity: 1;
      animation: subtitle-anim-0 0.5s 0.833s linear 1 normal forwards;
    }
    @keyframes glow-effect-left-anim-0 {
      0% { transform: scale(1, 1); }
      5% { transform: scale(1.002, 1.002); }
      10% { transform: scale(1.01, 1.01); }
      15% { transform: scale(1.021, 1.021); }
      20% { transform: scale(1.035, 1.035); }
      25% { transform: scale(1.05, 1.05); }
      30% { transform: scale(1.065, 1.065); }
      35% { transform: scale(1.079, 1.079); }
      40% { transform: scale(1.09, 1.09); }
      45% { transform: scale(1.098, 1.098); }
      50% { transform: scale(1.1, 1.1); }
      55% { transform: scale(1.098, 1.098); }
      60% { transform: scale(1.09, 1.09); }
      65% { transform: scale(1.079, 1.079); }
      70% { transform: scale(1.065, 1.065); }
      75% { transform: scale(1.05, 1.05); }
      80% { transform: scale(1.035, 1.035); }
      85% { transform: scale(1.021, 1.021); }
      90% { transform: scale(1.01, 1.01); }
      95% { transform: scale(1.002, 1.002); }
      100% { transform: scale(1, 1); }
    }
    #glow-effect-left {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: glow-effect-left-anim-0 2s 0s linear true normal none;
    }
    @keyframes glow-effect-right-anim-0 {
      0% { transform: scale(1, 1); }
      5% { transform: scale(1.002, 1.002); }
      10% { transform: scale(1.01, 1.01); }
      15% { transform: scale(1.021, 1.021); }
      20% { transform: scale(1.035, 1.035); }
      25% { transform: scale(1.05, 1.05); }
      30% { transform: scale(1.065, 1.065); }
      35% { transform: scale(1.079, 1.079); }
      40% { transform: scale(1.09, 1.09); }
      45% { transform: scale(1.098, 1.098); }
      50% { transform: scale(1.1, 1.1); }
      55% { transform: scale(1.098, 1.098); }
      60% { transform: scale(1.09, 1.09); }
      65% { transform: scale(1.079, 1.079); }
      70% { transform: scale(1.065, 1.065); }
      75% { transform: scale(1.05, 1.05); }
      80% { transform: scale(1.035, 1.035); }
      85% { transform: scale(1.021, 1.021); }
      90% { transform: scale(1.01, 1.01); }
      95% { transform: scale(1.002, 1.002); }
      100% { transform: scale(1, 1); }
    }
    #glow-effect-right {
      transform-origin: 250px 250px;
      transform: none;
      opacity: 1;
      animation: glow-effect-right-anim-0 2s 1s linear true normal none;
    }
  </style>

  <!-- Unsupported layer type "custom" (clock-left) -->
  <!-- Unsupported layer type "custom" (clock-right) -->
  <g id="warning-text" transform="translate(960, 540)">
    <text y="88" font-family="Arial Black, sans-serif" font-size="88" font-weight="900" font-style="normal" fill="#ffffff" text-anchor="middle" letter-spacing="0.05em" filter="url(#warning-text-shadow)"><tspan x="400" dy="0">TIME IS</tspan><tspan x="400" dy="105.6">RUNNING OUT</tspan></text>
  </g>
  <g id="subtitle" transform="translate(460, 730)">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="400" font-style="italic" fill="#cccccc" text-anchor="middle" filter="url(#subtitle-shadow)"><tspan x="500" dy="0">Every second counts</tspan></text>
  </g>
  <g id="glow-effect-left" transform="translate(240, 540)">
    <ellipse cx="250" cy="250" rx="250" ry="250" fill="rgba(255, 107, 107, 0.1)" />
  </g>
  <g id="glow-effect-right" transform="translate(1430, 290)">
    <ellipse cx="250" cy="250" rx="250" ry="250" fill="rgba(107, 170, 255, 0.1)" />
  </g>
</svg>