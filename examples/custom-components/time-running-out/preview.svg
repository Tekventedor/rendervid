<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="warning-text-shadow"><feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="rgba(255, 68, 68, 0.8), 0 0 60px rgba(255, 68, 68, 0.5)" /></filter>
    <filter id="subtitle-shadow"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="rgba(0, 0, 0, 0.8)" /></filter>
  </defs>

  <style>
    @keyframes warning-text-anim-0 {
      0% { transform: translate(0px, 50px); opacity: 0; }
      5% { transform: translate(0px, 42.869px); opacity: 0.143; }
      10% { transform: translate(0px, 36.45px); opacity: 0.271; }
      15% { transform: translate(0px, 30.706px); opacity: 0.386; }
      20% { transform: translate(0px, 25.6px); opacity: 0.488; }
      25% { transform: translate(0px, 21.094px); opacity: 0.578; }
      30% { transform: translate(0px, 17.15px); opacity: 0.657; }
      35% { transform: translate(0px, 13.731px); opacity: 0.725; }
      40% { transform: translate(0px, 10.8px); opacity: 0.784; }
      45% { transform: translate(0px, 8.319px); opacity: 0.834; }
      50% { transform: translate(0px, 6.25px); opacity: 0.875; }
      55% { transform: translate(0px, 4.556px); opacity: 0.909; }
      60% { transform: translate(0px, 3.2px); opacity: 0.936; }
      65% { transform: translate(0px, 2.144px); opacity: 0.957; }
      70% { transform: translate(0px, 1.35px); opacity: 0.973; }
      75% { transform: translate(0px, 0.781px); opacity: 0.984; }
      80% { transform: translate(0px, 0.4px); opacity: 0.992; }
      85% { transform: translate(0px, 0.169px); opacity: 0.997; }
      90% { transform: translate(0px, 0.05px); opacity: 0.999; }
      95% { transform: translate(0px, 0.006px); opacity: 1; }
      100% { transform: translate(0px, 0px); opacity: 1; }
    }
    @keyframes warning-text-anim-1 {
      0% { transform: scale(1, 1); }
      5% { transform: scale(1.002, 1.002); }
      10% { transform: scale(1.01, 1.01); }
      15% { transform: scale(1.021, 1.021); }
      20% { transform: scale(1.035, 1.035); }
      25% { transform: scale(1.05, 1.05); }
      30% { transform: scale(1.065, 1.065); }
      35% { transform: scale(1.079, 1.079); }
      40% { transform: scale(1.09, 1.09); }
      45% { transform: scale(1.098, 1.098); }
      50% { transform: scale(1.1, 1.1); }
      55% { transform: scale(1.098, 1.098); }
      60% { transform: scale(1.09, 1.09); }
      65% { transform: scale(1.079, 1.079); }
      70% { transform: scale(1.065, 1.065); }
      75% { transform: scale(1.05, 1.05); }
      80% { transform: scale(1.035, 1.035); }
      85% { transform: scale(1.021, 1.021); }
      90% { transform: scale(1.01, 1.01); }
      95% { transform: scale(1.002, 1.002); }
      100% { transform: scale(1, 1); }
    }
    #warning-text {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: warning-text-anim-0 0.667s 0.333s linear 1 normal forwards, warning-text-anim-1 1s 1s linear true normal none;
    }
    @keyframes subtitle-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
