      transform-origin: 200px 100px;
      transform: translate(200px, 100px);
      opacity: 1;
      animation: now-playing-text-anim-0 0.5s 0.917s linear 1 normal forwards;
    }
  </style>

  <rect id="rv-1" x="0" y="0" width="1920" height="1080" fill="#0a0015" opacity="0"><animate attributeName="opacity" from="1" to="1" begin="0s" dur="10s" fill="freeze" /></rect>
  <g id="background-gradient" transform="translate(0, 0)">
    <rect width="1920" height="1080" fill="linear-gradient(135deg, rgba(10,0,30,1), rgba(30,0,60,1))" />
  </g>
  <!-- Unsupported layer type "custom" (circular-spectrum) -->
  <!-- Unsupported layer type "custom" (audio-wave) -->
  <!-- Unsupported layer type "custom" (track-name) -->
  <g id="artist-name">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="normal" font-style="normal" fill="rgba(255, 255, 255, 0.7)" text-anchor="middle" letter-spacing="6px"><tspan x="800" dy="0">{{artist}}</tspan></text>
  </g>
  <g id="now-playing">
    <rect width="200" height="50" fill="rgba(255, 0, 255, 0.2)" stroke="rgba(255, 0, 255, 0.6)" stroke-width="2" />
  </g>
  <g id="now-playing-text">
    <text y="14" font-family="sans-serif" font-size="14" font-weight="bold" font-style="normal" fill="#ff00ff" text-anchor="middle" letter-spacing="2px"><tspan x="100" dy="0">NOW PLAYING</tspan></text>
  </g>
</svg>