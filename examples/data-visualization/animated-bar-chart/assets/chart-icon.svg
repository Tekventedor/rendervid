<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <!-- Base line -->
  <line x1="15" y1="85" x2="85" y2="85" stroke="#475569" stroke-width="2"/>
  <!-- Bars -->
  <rect x="20" y="25" width="15" height="60" rx="3" fill="url(#bar1)"/>
  <rect x="42" y="40" width="15" height="45" rx="3" fill="url(#bar2)"/>
  <rect x="64" y="50" width="15" height="35" rx="3" fill="url(#bar3)"/>
  <!-- Axis ticks -->
  <line x1="15" y1="25" x2="15" y2="85" stroke="#475569" stroke-width="2"/>
</svg>
