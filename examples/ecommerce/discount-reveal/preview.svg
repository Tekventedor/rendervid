  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#7c3aed" />
  </g>
  <g id="featured-image" transform="translate(0, 120)">
    <image href="{{productImage}}" width="800" height="700" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="label" transform="translate(560, 200)">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="600" font-style="normal" fill="#fbbf24" text-anchor="middle"><tspan x="400" dy="0">{{offerLabel}}</tspan></text>
  </g>
  <g id="value" transform="translate(460, 350)">
