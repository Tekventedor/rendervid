  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#7c3aed" />
  </g>
  <g id="featured-image">
    <image href="{{productImage}}" width="800" height="700" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="label">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="600" font-style="normal" fill="#fbbf24" text-anchor="middle"><tspan x="400" dy="0">{{offerLabel}}</tspan></text>
  </g>
  <g id="value">
    <text y="120" font-family="sans-serif" font-size="120" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="500" dy="0">{{discountValue}}</tspan></text>
  </g>
  <g id="code-label">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="normal" font-style="normal" fill="#c4b5fd" text-anchor="middle"><tspan x="300" dy="0">USE CODE</tspan></text>
  </g>
  <g id="code-bg">
    <rect x="0" y="0" width="800" height="120" rx="0" ry="0" fill="#ffffff" />
  </g>
  <g id="code">
    <text y="64" font-family="sans-serif" font-size="64" font-weight="bold" font-style="normal" fill="#7c3aed" text-anchor="middle"><tspan x="375" dy="0">{{discountCode}}</tspan></text>
  </g>
  <g id="validity">
    <text y="26" font-family="sans-serif" font-size="26" font-weight="normal" font-style="normal" fill="#e9d5ff" text-anchor="middle"><tspan x="400" dy="0">{{validity}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
