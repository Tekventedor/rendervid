  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#dc2626" />
  </g>
  <g id="featured-image">
    <image href="{{productImage}}" width="700" height="700" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="flash-badge">
    <text y="48" font-family="sans-serif" font-size="48" font-weight="bold" font-style="normal" fill="#fbbf24" text-anchor="middle"><tspan x="300" dy="0">FLASH SALE</tspan></text>
  </g>
  <g id="discount">
    <text y="180" font-family="sans-serif" font-size="180" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="500" dy="0">{{discount}}</tspan></text>
  </g>
  <g id="off">
