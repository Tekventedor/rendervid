      5% { transform: translate(0px, 100px) scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: translate(0px, 100px) scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: translate(0px, 100px) scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: translate(0px, 100px) scale(0.488, 0.488); opacity: 0.488; }
