      transform: translate(360px, 550px);
      opacity: 1;
      animation: tagline-anim-0 0.833s 1.5s linear 1 normal forwards;
    }
    @keyframes date-anim-0 {
      0% { transform: translate(560px, 800px); opacity: 0; }
      5% { transform: translate(560px, 800px); opacity: 0.143; }
      10% { transform: translate(560px, 800px); opacity: 0.271; }
      15% { transform: translate(560px, 800px); opacity: 0.386; }
      20% { transform: translate(560px, 800px); opacity: 0.488; }
      25% { transform: translate(560px, 800px); opacity: 0.578; }
      30% { transform: translate(560px, 800px); opacity: 0.657; }
      35% { transform: translate(560px, 800px); opacity: 0.725; }
      40% { transform: translate(560px, 800px); opacity: 0.784; }
      45% { transform: translate(560px, 800px); opacity: 0.834; }
      50% { transform: translate(560px, 800px); opacity: 0.875; }
      55% { transform: translate(560px, 800px); opacity: 0.909; }
      60% { transform: translate(560px, 800px); opacity: 0.936; }
      65% { transform: translate(560px, 800px); opacity: 0.957; }
      70% { transform: translate(560px, 800px); opacity: 0.973; }
      75% { transform: translate(560px, 800px); opacity: 0.984; }
      80% { transform: translate(560px, 800px); opacity: 0.992; }
      85% { transform: translate(560px, 800px); opacity: 0.997; }
      90% { transform: translate(560px, 800px); opacity: 0.999; }
      95% { transform: translate(560px, 800px); opacity: 1; }
      100% { transform: translate(560px, 800px); opacity: 1; }
    }
    #date {
      transform-origin: 560px 800px;
      transform: translate(560px, 800px);
      opacity: 1;
      animation: date-anim-0 0.833s 2s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="bg-color" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#0a0a0a" />
  </g>
  <g id="featured-image">
    <image href="{{productImage}}" width="800" height="800" preserveAspectRatio="xMidYMid slice" />
  </g>
  <!-- Unsupported layer type "video" (bg-video) -->
  <g id="overlay" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="url(#overlay-grad)" />
  </g>
  <g id="glow">
    <rect x="0" y="0" width="800" height="400" rx="0" ry="0" fill="#3b82f6" />
  </g>
  <g id="intro">
    <text y="32" font-family="sans-serif" font-size="32" font-weight="600" font-style="normal" fill="#3b82f6" text-anchor="middle"><tspan x="300" dy="0">INTRODUCING</tspan></text>
  </g>
  <g id="name">
    <text y="96" font-family="sans-serif" font-size="96" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="700" dy="0">{{productName}}</tspan></text>
  </g>
  <g id="tagline">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="normal" font-style="normal" fill="#94a3b8" text-anchor="middle"><tspan x="600" dy="0">{{tagline}}</tspan></text>
  </g>
  <g id="date">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="600" font-style="normal" fill="#3b82f6" text-anchor="middle"><tspan x="400" dy="0">{{launchDate}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>