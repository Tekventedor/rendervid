      45% { transform: translate(260px, 350px) scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: translate(260px, 350px) scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: translate(260px, 350px) scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: translate(260px, 350px) scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: translate(260px, 350px) scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: translate(260px, 350px) scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: translate(260px, 350px) scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: translate(260px, 350px) scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: translate(260px, 350px) scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: translate(260px, 350px) scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: translate(260px, 350px) scale(1, 1); opacity: 1; }
      100% { transform: translate(260px, 350px); opacity: 1; }
    }
    #name {
      transform-origin: 260px 350px;
      transform: translate(260px, 350px);
      opacity: 1;
      animation: name-anim-0 1s 0.833s linear 1 normal forwards;
    }
    @keyframes tagline-anim-0 {
      0% { transform: translate(360px, 1630px); opacity: 1; }
      5% { transform: translate(360px, 1475.965px); opacity: 1; }
      10% { transform: translate(360px, 1337.32px); opacity: 1; }
      15% { transform: translate(360px, 1213.255px); opacity: 1; }
      20% { transform: translate(360px, 1102.96px); opacity: 1; }
      25% { transform: translate(360px, 1005.625px); opacity: 1; }
      30% { transform: translate(360px, 920.44px); opacity: 1; }
      35% { transform: translate(360px, 846.595px); opacity: 1; }
      40% { transform: translate(360px, 783.28px); opacity: 1; }
      45% { transform: translate(360px, 729.685px); opacity: 1; }
      50% { transform: translate(360px, 685px); opacity: 1; }
      55% { transform: translate(360px, 648.415px); opacity: 1; }
      60% { transform: translate(360px, 619.12px); opacity: 1; }
      65% { transform: translate(360px, 596.305px); opacity: 1; }
      70% { transform: translate(360px, 579.16px); opacity: 1; }
      75% { transform: translate(360px, 566.875px); opacity: 1; }
      80% { transform: translate(360px, 558.64px); opacity: 1; }
      85% { transform: translate(360px, 553.645px); opacity: 1; }
      90% { transform: translate(360px, 551.08px); opacity: 1; }
      95% { transform: translate(360px, 550.135px); opacity: 1; }
