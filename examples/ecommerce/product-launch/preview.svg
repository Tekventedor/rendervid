      30% { transform: translate(0px, 100px) scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: translate(0px, 100px) scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: translate(0px, 100px) scale(0.784, 0.784); opacity: 0.784; }
