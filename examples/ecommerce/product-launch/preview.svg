      55% { transform: translate(660px, 200px); opacity: 0.909; }
      60% { transform: translate(660px, 200px); opacity: 0.936; }
      65% { transform: translate(660px, 200px); opacity: 0.957; }
      70% { transform: translate(660px, 200px); opacity: 0.973; }
      75% { transform: translate(660px, 200px); opacity: 0.984; }
      80% { transform: translate(660px, 200px); opacity: 0.992; }
      85% { transform: translate(660px, 200px); opacity: 0.997; }
      90% { transform: translate(660px, 200px); opacity: 0.999; }
      95% { transform: translate(660px, 200px); opacity: 1; }
      100% { transform: translate(660px, 200px); opacity: 1; }
    }
    #intro {
      transform-origin: 660px 200px;
      transform: translate(660px, 200px);
      opacity: 1;
      animation: intro-anim-0 0.833s 0.333s linear 1 normal forwards;
    }
    @keyframes name-anim-0 {
      0% { transform: translate(260px, 350px) scale(0, 0); opacity: 0; }
      5% { transform: translate(260px, 350px) scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: translate(260px, 350px) scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: translate(260px, 350px) scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: translate(260px, 350px) scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: translate(260px, 350px) scale(0.578, 0.578); opacity: 0.578; }
