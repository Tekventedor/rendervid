      40% { transform: translate(230px, 480px); opacity: 0.784; }
      45% { transform: translate(230px, 480px); opacity: 0.834; }
      50% { transform: translate(230px, 480px); opacity: 0.875; }
      55% { transform: translate(230px, 480px); opacity: 0.909; }
      60% { transform: translate(230px, 480px); opacity: 0.936; }
      65% { transform: translate(230px, 480px); opacity: 0.957; }
      70% { transform: translate(230px, 480px); opacity: 0.973; }
      75% { transform: translate(230px, 480px); opacity: 0.984; }
      80% { transform: translate(230px, 480px); opacity: 0.992; }
      85% { transform: translate(230px, 480px); opacity: 0.997; }
