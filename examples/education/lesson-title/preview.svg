<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes number-bg-anim-0 {
      0% { transform: translate(100px, 400px) scale(0, 0); opacity: 0; }
      5% { transform: translate(100px, 400px) scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: translate(100px, 400px) scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: translate(100px, 400px) scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: translate(100px, 400px) scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: translate(100px, 400px) scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: translate(100px, 400px) scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: translate(100px, 400px) scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: translate(100px, 400px) scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: translate(100px, 400px) scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: translate(100px, 400px) scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: translate(100px, 400px) scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: translate(100px, 400px) scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: translate(100px, 400px) scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: translate(100px, 400px) scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: translate(100px, 400px) scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: translate(100px, 400px) scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: translate(100px, 400px) scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: translate(100px, 400px) scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: translate(100px, 400px) scale(1, 1); opacity: 1; }
      100% { transform: translate(100px, 400px); opacity: 1; }
    }
    #number-bg {
      transform-origin: 100px 400px;
      transform: translate(100px, 400px);
      opacity: 1;
      animation: number-bg-anim-0 0.833s 0s linear 1 normal forwards;
    }
    @keyframes number-anim-0 {
      0% { transform: translate(100px, 460px); opacity: 0; }
      5% { transform: translate(100px, 460px); opacity: 0.143; }
      10% { transform: translate(100px, 460px); opacity: 0.271; }
      15% { transform: translate(100px, 460px); opacity: 0.386; }
      20% { transform: translate(100px, 460px); opacity: 0.488; }
      25% { transform: translate(100px, 460px); opacity: 0.578; }
      30% { transform: translate(100px, 460px); opacity: 0.657; }
      35% { transform: translate(100px, 460px); opacity: 0.725; }
      40% { transform: translate(100px, 460px); opacity: 0.784; }
      45% { transform: translate(100px, 460px); opacity: 0.834; }
      50% { transform: translate(100px, 460px); opacity: 0.875; }
      55% { transform: translate(100px, 460px); opacity: 0.909; }
      60% { transform: translate(100px, 460px); opacity: 0.936; }
      65% { transform: translate(100px, 460px); opacity: 0.957; }
      70% { transform: translate(100px, 460px); opacity: 0.973; }
      75% { transform: translate(100px, 460px); opacity: 0.984; }
      80% { transform: translate(100px, 460px); opacity: 0.992; }
      85% { transform: translate(100px, 460px); opacity: 0.997; }
      90% { transform: translate(100px, 460px); opacity: 0.999; }
      95% { transform: translate(100px, 460px); opacity: 1; }
      100% { transform: translate(100px, 460px); opacity: 1; }
    }
    #number {
      transform-origin: 100px 460px;
      transform: translate(100px, 460px);
      opacity: 1;
      animation: number-anim-0 0.667s 0.667s linear 1 normal forwards;
    }
    @keyframes label-anim-0 {
      0% { transform: translate(-1570px, 400px); opacity: 1; }
      5% { transform: translate(-1296.16px, 400px); opacity: 1; }
      10% { transform: translate(-1049.68px, 400px); opacity: 1; }
      15% { transform: translate(-829.12px, 400px); opacity: 1; }
      20% { transform: translate(-633.04px, 400px); opacity: 1; }
      25% { transform: translate(-460px, 400px); opacity: 1; }
      30% { transform: translate(-308.56px, 400px); opacity: 1; }
      35% { transform: translate(-177.28px, 400px); opacity: 1; }
      40% { transform: translate(-64.72px, 400px); opacity: 1; }
      45% { transform: translate(30.56px, 400px); opacity: 1; }
      50% { transform: translate(110px, 400px); opacity: 1; }
      55% { transform: translate(175.04px, 400px); opacity: 1; }
      60% { transform: translate(227.12px, 400px); opacity: 1; }
      65% { transform: translate(267.68px, 400px); opacity: 1; }
      70% { transform: translate(298.16px, 400px); opacity: 1; }
      75% { transform: translate(320px, 400px); opacity: 1; }
      80% { transform: translate(334.64px, 400px); opacity: 1; }
      85% { transform: translate(343.52px, 400px); opacity: 1; }
      90% { transform: translate(348.08px, 400px); opacity: 1; }
      95% { transform: translate(349.76px, 400px); opacity: 1; }
      100% { transform: translate(350px, 400px); opacity: 1; }
    }
    #label {
      transform-origin: 350px 400px;
      transform: translate(350px, 400px);
      opacity: 1;
      animation: label-anim-0 0.667s 0.833s linear 1 normal forwards;
    }
    @keyframes title-anim-0 {
      0% { transform: translate(-1570px, 480px); opacity: 1; }
      5% { transform: translate(-1296.16px, 480px); opacity: 1; }
      10% { transform: translate(-1049.68px, 480px); opacity: 1; }
      15% { transform: translate(-829.12px, 480px); opacity: 1; }
      20% { transform: translate(-633.04px, 480px); opacity: 1; }
      25% { transform: translate(-460px, 480px); opacity: 1; }
      30% { transform: translate(-308.56px, 480px); opacity: 1; }
      35% { transform: translate(-177.28px, 480px); opacity: 1; }
      40% { transform: translate(-64.72px, 480px); opacity: 1; }
      45% { transform: translate(30.56px, 480px); opacity: 1; }
      50% { transform: translate(110px, 480px); opacity: 1; }
      55% { transform: translate(175.04px, 480px); opacity: 1; }
      60% { transform: translate(227.12px, 480px); opacity: 1; }
      65% { transform: translate(267.68px, 480px); opacity: 1; }
      70% { transform: translate(298.16px, 480px); opacity: 1; }
      75% { transform: translate(320px, 480px); opacity: 1; }
      80% { transform: translate(334.64px, 480px); opacity: 1; }
      85% { transform: translate(343.52px, 480px); opacity: 1; }
      90% { transform: translate(348.08px, 480px); opacity: 1; }
      95% { transform: translate(349.76px, 480px); opacity: 1; }
      100% { transform: translate(350px, 480px); opacity: 1; }
    }
    #title {
      transform-origin: 350px 480px;
      transform: translate(350px, 480px);
      opacity: 1;
      animation: title-anim-0 0.833s 1s linear 1 normal forwards;
    }
    @keyframes duration-anim-0 {
      0% { transform: translate(350px, 640px); opacity: 0; }
      5% { transform: translate(350px, 640px); opacity: 0.143; }
      10% { transform: translate(350px, 640px); opacity: 0.271; }
      15% { transform: translate(350px, 640px); opacity: 0.386; }
      20% { transform: translate(350px, 640px); opacity: 0.488; }
      25% { transform: translate(350px, 640px); opacity: 0.578; }
      30% { transform: translate(350px, 640px); opacity: 0.657; }
      35% { transform: translate(350px, 640px); opacity: 0.725; }
      40% { transform: translate(350px, 640px); opacity: 0.784; }
      45% { transform: translate(350px, 640px); opacity: 0.834; }
      50% { transform: translate(350px, 640px); opacity: 0.875; }
      55% { transform: translate(350px, 640px); opacity: 0.909; }
      60% { transform: translate(350px, 640px); opacity: 0.936; }
      65% { transform: translate(350px, 640px); opacity: 0.957; }
      70% { transform: translate(350px, 640px); opacity: 0.973; }
      75% { transform: translate(350px, 640px); opacity: 0.984; }
      80% { transform: translate(350px, 640px); opacity: 0.992; }
      85% { transform: translate(350px, 640px); opacity: 0.997; }
      90% { transform: translate(350px, 640px); opacity: 0.999; }
      95% { transform: translate(350px, 640px); opacity: 1; }
      100% { transform: translate(350px, 640px); opacity: 1; }
    }
    #duration {
      transform-origin: 350px 640px;
      transform: translate(350px, 640px);
      opacity: 1;
      animation: duration-anim-0 0.667s 1.5s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#0ea5e9" />
  </g>
  <g id="number-bg">
    <rect x="0" y="0" width="200" height="200" rx="0" ry="0" fill="#ffffff" />
  </g>
  <g id="number">
    <text y="72" font-family="sans-serif" font-size="72" font-weight="bold" font-style="normal" fill="#0ea5e9" text-anchor="middle"><tspan x="100" dy="0">{{lessonNumber}}</tspan></text>
  </g>
  <g id="label">
    <text y="24" font-family="sans-serif" font-size="24" font-weight="600" font-style="normal" fill="#bae6fd" text-anchor="start"><tspan x="0" dy="0">LESSON</tspan></text>
  </g>
  <g id="title">
    <text y="64" font-family="sans-serif" font-size="64" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="start"><tspan x="0" dy="0">{{lessonTitle}}</tspan></text>
  </g>
  <g id="duration">
    <text y="22" font-family="sans-serif" font-size="22" font-weight="normal" font-style="normal" fill="#e0f2fe" text-anchor="start"><tspan x="0" dy="0">{{duration}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>