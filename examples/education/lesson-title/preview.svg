<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes number-bg-anim-0 {
      0% { transform: scale(0, 0); opacity: 0; }
      5% { transform: scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: scale(1, 1); opacity: 1; }
      100% { transform: scale(1, 1); opacity: 1; }
    }
    #number-bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: number-bg-anim-0 0.833s 0s linear 1 normal forwards;
    }
    @keyframes number-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #number {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: number-anim-0 0.667s 0.667s linear 1 normal forwards;
    }
    @keyframes label-anim-0 {
      0% { transform: translate(-1920px, 0px); }
      5% { transform: translate(-1646.16px, 0px); }
      10% { transform: translate(-1399.68px, 0px); }
      15% { transform: translate(-1179.12px, 0px); }
      20% { transform: translate(-983.04px, 0px); }
      25% { transform: translate(-810px, 0px); }
      30% { transform: translate(-658.56px, 0px); }
      35% { transform: translate(-527.28px, 0px); }
      40% { transform: translate(-414.72px, 0px); }
      45% { transform: translate(-319.44px, 0px); }
      50% { transform: translate(-240px, 0px); }
      55% { transform: translate(-174.96px, 0px); }
      60% { transform: translate(-122.88px, 0px); }
      65% { transform: translate(-82.32px, 0px); }
      70% { transform: translate(-51.84px, 0px); }
      75% { transform: translate(-30px, 0px); }
      80% { transform: translate(-15.36px, 0px); }
      85% { transform: translate(-6.48px, 0px); }
      90% { transform: translate(-1.92px, 0px); }
      95% { transform: translate(-0.24px, 0px); }
      100% { transform: translate(0px, 0px); }
    }
    #label {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: label-anim-0 0.667s 0.833s linear 1 normal forwards;
    }
    @keyframes title-anim-0 {
      0% { transform: translate(-1920px, 0px); }
      5% { transform: translate(-1646.16px, 0px); }
      10% { transform: translate(-1399.68px, 0px); }
      15% { transform: translate(-1179.12px, 0px); }
      20% { transform: translate(-983.04px, 0px); }
      25% { transform: translate(-810px, 0px); }
      30% { transform: translate(-658.56px, 0px); }
      35% { transform: translate(-527.28px, 0px); }
      40% { transform: translate(-414.72px, 0px); }
      45% { transform: translate(-319.44px, 0px); }
      50% { transform: translate(-240px, 0px); }
      55% { transform: translate(-174.96px, 0px); }
      60% { transform: translate(-122.88px, 0px); }
      65% { transform: translate(-82.32px, 0px); }
      70% { transform: translate(-51.84px, 0px); }
      75% { transform: translate(-30px, 0px); }
      80% { transform: translate(-15.36px, 0px); }
      85% { transform: translate(-6.48px, 0px); }
      90% { transform: translate(-1.92px, 0px); }
      95% { transform: translate(-0.24px, 0px); }
      100% { transform: translate(0px, 0px); }
    }
    #title {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: title-anim-0 0.833s 1s linear 1 normal forwards;
    }
    @keyframes duration-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #duration {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: duration-anim-0 0.667s 1.5s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#0ea5e9" />
  </g>
  <g id="number-bg" transform="translate(100, 400)">
    <rect x="0" y="0" width="200" height="200" rx="0" ry="0" fill="#ffffff" />
  </g>
  <g id="number" transform="translate(100, 460)">
    <text y="72" font-family="sans-serif" font-size="72" font-weight="bold" font-style="normal" fill="#0ea5e9" text-anchor="middle"><tspan x="100" dy="0">{{lessonNumber}}</tspan></text>
  </g>
  <g id="label" transform="translate(350, 400)">
    <text y="24" font-family="sans-serif" font-size="24" font-weight="600" font-style="normal" fill="#bae6fd" text-anchor="start"><tspan x="0" dy="0">LESSON</tspan></text>
  </g>
  <g id="title" transform="translate(350, 480)">
    <text y="64" font-family="sans-serif" font-size="64" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="start"><tspan x="0" dy="0">{{lessonTitle}}</tspan></text>
  </g>
  <g id="duration" transform="translate(350, 640)">
    <text y="22" font-family="sans-serif" font-size="22" font-weight="normal" font-style="normal" fill="#e0f2fe" text-anchor="start"><tspan x="0" dy="0">{{duration}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>