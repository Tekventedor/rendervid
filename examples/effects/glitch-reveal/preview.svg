<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <style>
    #bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #static-noise {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.03;
    }
    @keyframes status-text-anim-0 {
      0% { transform: translate(660px, 600px); opacity: 0; }
      5% { transform: translate(660px, 600px); opacity: 0.143; }
      10% { transform: translate(660px, 600px); opacity: 0.271; }
      15% { transform: translate(660px, 600px); opacity: 0.386; }
      20% { transform: translate(660px, 600px); opacity: 0.488; }
      25% { transform: translate(660px, 600px); opacity: 0.578; }
      30% { transform: translate(660px, 600px); opacity: 0.657; }
      35% { transform: translate(660px, 600px); opacity: 0.725; }
      40% { transform: translate(660px, 600px); opacity: 0.784; }
      45% { transform: translate(660px, 600px); opacity: 0.834; }
      50% { transform: translate(660px, 600px); opacity: 0.875; }
      55% { transform: translate(660px, 600px); opacity: 0.909; }
      60% { transform: translate(660px, 600px); opacity: 0.936; }
      65% { transform: translate(660px, 600px); opacity: 0.957; }
      70% { transform: translate(660px, 600px); opacity: 0.973; }
      75% { transform: translate(660px, 600px); opacity: 0.984; }
      80% { transform: translate(660px, 600px); opacity: 0.992; }
      85% { transform: translate(660px, 600px); opacity: 0.997; }
      90% { transform: translate(660px, 600px); opacity: 0.999; }
      95% { transform: translate(660px, 600px); opacity: 1; }
      100% { transform: translate(660px, 600px); opacity: 1; }
    }
    @keyframes status-text-anim-1 {
      0% { transform: translate(660px, 600px); opacity: 1; }
      5% { transform: translate(660px, 600px); opacity: 1; }
      10% { transform: translate(660px, 600px); opacity: 0.999; }
      15% { transform: translate(660px, 600px); opacity: 0.997; }
      20% { transform: translate(660px, 600px); opacity: 0.992; }
      25% { transform: translate(660px, 600px); opacity: 0.984; }
      30% { transform: translate(660px, 600px); opacity: 0.973; }
      35% { transform: translate(660px, 600px); opacity: 0.957; }
      40% { transform: translate(660px, 600px); opacity: 0.936; }
      45% { transform: translate(660px, 600px); opacity: 0.909; }
      50% { transform: translate(660px, 600px); opacity: 0.875; }
      55% { transform: translate(660px, 600px); opacity: 0.834; }
      60% { transform: translate(660px, 600px); opacity: 0.784; }
      65% { transform: translate(660px, 600px); opacity: 0.725; }
      70% { transform: translate(660px, 600px); opacity: 0.657; }
      75% { transform: translate(660px, 600px); opacity: 0.578; }
      80% { transform: translate(660px, 600px); opacity: 0.488; }
      85% { transform: translate(660px, 600px); opacity: 0.386; }
      90% { transform: translate(660px, 600px); opacity: 0.271; }
      95% { transform: translate(660px, 600px); opacity: 0.143; }
      100% { transform: translate(660px, 600px); opacity: 0; }
    }
    #status-text {
      transform-origin: 660px 600px;
      transform: translate(660px, 600px);
      opacity: 1;
      animation: status-text-anim-0 0.667s 0.333s linear 1 normal forwards, status-text-anim-1 0.667s 3.333s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="{{backgroundColor}}" />
  </g>
  <g id="static-noise" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#ffffff" />
  </g>
  <!-- Unsupported layer type "custom" (reveal-text) -->
  <g id="status-text">
    <text y="18" font-family="monospace" font-size="18" font-weight="normal" font-style="normal" fill="{{textColor}}" text-anchor="middle" letter-spacing="6"><tspan x="300" dy="0">DECODING...</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>