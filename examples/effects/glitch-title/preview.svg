<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <style>
    #bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #scanlines {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.05;
    }
    @keyframes subtitle-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #subtitle {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: subtitle-anim-0 1s 1.5s linear 1 normal forwards;
    }
    @keyframes line-top-anim-0 {
      0% { transform: scale(0, 0); opacity: 0; }
      5% { transform: scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: scale(1, 1); opacity: 1; }
      100% { transform: scale(1, 1); opacity: 1; }
    }
    #line-top {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.5;
      animation: line-top-anim-0 0.667s 1s linear 1 normal forwards;
    }
    @keyframes line-bottom-anim-0 {
      0% { transform: scale(0, 0); opacity: 0; }
      5% { transform: scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: scale(1, 1); opacity: 1; }
      100% { transform: scale(1, 1); opacity: 1; }
    }
    #line-bottom {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.5;
      animation: line-bottom-anim-0 0.667s 1s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#0a0a0a" />
  </g>
  <g id="scanlines" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#ffffff" />
  </g>
  <!-- Unsupported layer type "custom" (glitch-title) -->
  <g id="subtitle" transform="translate(360, 600)">
    <text y="32" font-family="monospace" font-size="32" font-weight="300" font-style="normal" fill="{{accentColor}}" text-anchor="middle" letter-spacing="8"><tspan x="600" dy="0">{{subtitle}}</tspan></text>
  </g>
  <g id="line-top" transform="translate(460, 370)">
    <rect x="0" y="0" width="1000" height="2" rx="0" ry="0" fill="{{accentColor}}" />
  </g>
  <g id="line-bottom" transform="translate(460, 590)">
    <rect x="0" y="0" width="1000" height="2" rx="0" ry="0" fill="{{accentColor}}" />
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>