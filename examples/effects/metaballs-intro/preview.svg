<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="title-shadow"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(0, 0, 0, 0.8)" /></filter>
    <filter id="subtitle-shadow"><feDropShadow dx="0" dy="2" stdDeviation="7.5" flood-color="rgba(0, 0, 0, 0.8)" /></filter>
    <filter id="cta-shadow"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="rgba(0, 0, 0, 0.8)" /></filter>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #overlay-top {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.3;
    }
    #overlay-bottom {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.3;
    }
    @keyframes title-anim-0 {
      0% { transform: translate(360px, 420px) scale(0, 0); opacity: 0; }
      5% { transform: translate(360px, 420px) scale(0.219, 0.219); opacity: 0.219; }
      10% { transform: translate(360px, 420px) scale(0.409, 0.409); opacity: 0.409; }
      15% { transform: translate(360px, 420px) scale(0.57, 0.57); opacity: 0.57; }
      20% { transform: translate(360px, 420px) scale(0.706, 0.706); opacity: 0.706; }
      25% { transform: translate(360px, 420px) scale(0.817, 0.817); opacity: 0.817; }
      30% { transform: translate(360px, 420px) scale(0.907, 0.907); opacity: 0.907; }
      35% { transform: translate(360px, 420px) scale(0.977, 0.977); opacity: 0.977; }
      40% { transform: translate(360px, 420px) scale(1.029, 1.029); opacity: 1.029; }
      45% { transform: translate(360px, 420px) scale(1.065, 1.065); opacity: 1.065; }
      50% { transform: translate(360px, 420px) scale(1.088, 1.088); opacity: 1.088; }
      55% { transform: translate(360px, 420px) scale(1.098, 1.098); opacity: 1.098; }
      60% { transform: translate(360px, 420px) scale(1.099, 1.099); opacity: 1.099; }
      65% { transform: translate(360px, 420px) scale(1.093, 1.093); opacity: 1.093; }
      70% { transform: translate(360px, 420px) scale(1.08, 1.08); opacity: 1.08; }
      75% { transform: translate(360px, 420px) scale(1.064, 1.064); opacity: 1.064; }
      80% { transform: translate(360px, 420px) scale(1.046, 1.046); opacity: 1.046; }
      85% { transform: translate(360px, 420px) scale(1.029, 1.029); opacity: 1.029; }
      90% { transform: translate(360px, 420px) scale(1.014, 1.014); opacity: 1.014; }
      95% { transform: translate(360px, 420px) scale(1.004, 1.004); opacity: 1.004; }
      100% { transform: translate(360px, 420px); opacity: 1; }
    }
    #title {
      transform-origin: 360px 420px;
      transform: translate(360px, 420px);
      opacity: 1;
      animation: title-anim-0 1s 0.667s linear 1 normal forwards;
    }
    @keyframes title-underline-anim-0 {
      0% { transform: translate(760px, 545px) scale(0, 0); opacity: 0; }
      5% { transform: translate(760px, 545px) scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: translate(760px, 545px) scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: translate(760px, 545px) scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: translate(760px, 545px) scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: translate(760px, 545px) scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: translate(760px, 545px) scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: translate(760px, 545px) scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: translate(760px, 545px) scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: translate(760px, 545px) scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: translate(760px, 545px) scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: translate(760px, 545px) scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: translate(760px, 545px) scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: translate(760px, 545px) scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: translate(760px, 545px) scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: translate(760px, 545px) scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: translate(760px, 545px) scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: translate(760px, 545px) scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: translate(760px, 545px) scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: translate(760px, 545px) scale(1, 1); opacity: 1; }
      100% { transform: translate(760px, 545px); opacity: 1; }
    }
    #title-underline {
      transform-origin: 760px 545px;
      transform: translate(760px, 545px);
      opacity: 1;
      animation: title-underline-anim-0 0.667s 1.5s linear 1 normal forwards;
    }
    @keyframes subtitle-anim-0 {
      0% { transform: translate(560px, 570px); opacity: 0; }
      5% { transform: translate(560px, 570px); opacity: 0.143; }
      10% { transform: translate(560px, 570px); opacity: 0.271; }
      15% { transform: translate(560px, 570px); opacity: 0.386; }
      20% { transform: translate(560px, 570px); opacity: 0.488; }
      25% { transform: translate(560px, 570px); opacity: 0.578; }
      30% { transform: translate(560px, 570px); opacity: 0.657; }
      35% { transform: translate(560px, 570px); opacity: 0.725; }
      40% { transform: translate(560px, 570px); opacity: 0.784; }
      45% { transform: translate(560px, 570px); opacity: 0.834; }
      50% { transform: translate(560px, 570px); opacity: 0.875; }
      55% { transform: translate(560px, 570px); opacity: 0.909; }
      60% { transform: translate(560px, 570px); opacity: 0.936; }
      65% { transform: translate(560px, 570px); opacity: 0.957; }
      70% { transform: translate(560px, 570px); opacity: 0.973; }
      75% { transform: translate(560px, 570px); opacity: 0.984; }
      80% { transform: translate(560px, 570px); opacity: 0.992; }
      85% { transform: translate(560px, 570px); opacity: 0.997; }
      90% { transform: translate(560px, 570px); opacity: 0.999; }
      95% { transform: translate(560px, 570px); opacity: 1; }
      100% { transform: translate(560px, 570px); opacity: 1; }
    }
    #subtitle {
      transform-origin: 560px 570px;
      transform: translate(560px, 570px);
      opacity: 1;
      animation: subtitle-anim-0 0.833s 2s linear 1 normal forwards;
    }
    @keyframes cta-anim-0 {
      0% { transform: translate(710px, 1980px); opacity: 1; }
      5% { transform: translate(710px, 1825.965px); opacity: 1; }
      10% { transform: translate(710px, 1687.32px); opacity: 1; }
      15% { transform: translate(710px, 1563.255px); opacity: 1; }
      20% { transform: translate(710px, 1452.96px); opacity: 1; }
      25% { transform: translate(710px, 1355.625px); opacity: 1; }
      30% { transform: translate(710px, 1270.44px); opacity: 1; }
      35% { transform: translate(710px, 1196.595px); opacity: 1; }
      40% { transform: translate(710px, 1133.28px); opacity: 1; }
      45% { transform: translate(710px, 1079.685px); opacity: 1; }
      50% { transform: translate(710px, 1035px); opacity: 1; }
      55% { transform: translate(710px, 998.415px); opacity: 1; }
      60% { transform: translate(710px, 969.12px); opacity: 1; }
      65% { transform: translate(710px, 946.305px); opacity: 1; }
      70% { transform: translate(710px, 929.16px); opacity: 1; }
      75% { transform: translate(710px, 916.875px); opacity: 1; }
      80% { transform: translate(710px, 908.64px); opacity: 1; }
      85% { transform: translate(710px, 903.645px); opacity: 1; }
      90% { transform: translate(710px, 901.08px); opacity: 1; }
      95% { transform: translate(710px, 900.135px); opacity: 1; }
      100% { transform: translate(710px, 900px); opacity: 1; }
    }
    #cta {
      transform-origin: 710px 900px;
      transform: translate(710px, 900px);
      opacity: 1;
      animation: cta-anim-0 0.667s 2.5s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="overlay-top" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="200" rx="0" ry="0" fill="linear-gradient(to bottom, #0a0014 0%, transparent 100%)" />
  </g>
  <g id="overlay-bottom" transform="translate(0, 880)">
    <rect x="0" y="0" width="1920" height="200" rx="0" ry="0" fill="linear-gradient(to top, #0a0014 0%, transparent 100%)" />
  </g>
  <g id="title">
    <text y="96" font-family="sans-serif" font-size="96" font-weight="900" font-style="normal" fill="#ffffff" text-anchor="middle" letter-spacing="10" filter="url(#title-shadow)"><tspan x="600" dy="0">{{title}}</tspan></text>
  </g>
  <g id="title-underline">
    <rect x="0" y="0" width="400" height="6" rx="0" ry="0" fill="{{primaryColor}}" />
  </g>
  <g id="subtitle">
    <text y="38" font-family="sans-serif" font-size="38" font-weight="300" font-style="normal" fill="#e0e0e0" text-anchor="middle" letter-spacing="4" filter="url(#subtitle-shadow)"><tspan x="400" dy="0">{{subtitle}}</tspan></text>
  </g>
  <g id="cta">
    <text y="26" font-family="sans-serif" font-size="26" font-weight="500" font-style="normal" fill="#ffffff" text-anchor="middle" letter-spacing="3" filter="url(#cta-shadow)"><tspan x="250" dy="0">Experience the Flow</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>