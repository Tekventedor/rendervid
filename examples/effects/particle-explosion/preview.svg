<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <radialGradient id="center-glow-grad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffffff" /><stop offset="30%" stop-color="#ff6b6b" /><stop offset="60%" stop-color="#ffd93d" /><stop offset="100%" stop-color="transparent" /></radialGradient>
    <filter id="message-shadow"><feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="rgba(255, 107, 107, 0.6)" /></filter>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes center-glow-anim-0 {
      0% { transform: translate(660px, 240px) scale(0, 0); opacity: 0; }
      5% { transform: translate(660px, 240px) scale(0.143, 0.143); opacity: 0.057; }
      10% { transform: translate(660px, 240px) scale(0.271, 0.271); opacity: 0.108; }
      15% { transform: translate(660px, 240px) scale(0.386, 0.386); opacity: 0.154; }
      20% { transform: translate(660px, 240px) scale(0.488, 0.488); opacity: 0.195; }
      25% { transform: translate(660px, 240px) scale(0.578, 0.578); opacity: 0.231; }
      30% { transform: translate(660px, 240px) scale(0.657, 0.657); opacity: 0.263; }
      35% { transform: translate(660px, 240px) scale(0.725, 0.725); opacity: 0.29; }
      40% { transform: translate(660px, 240px) scale(0.784, 0.784); opacity: 0.314; }
      45% { transform: translate(660px, 240px) scale(0.834, 0.834); opacity: 0.333; }
      50% { transform: translate(660px, 240px) scale(0.875, 0.875); opacity: 0.35; }
      55% { transform: translate(660px, 240px) scale(0.909, 0.909); opacity: 0.364; }
      60% { transform: translate(660px, 240px) scale(0.936, 0.936); opacity: 0.374; }
      65% { transform: translate(660px, 240px) scale(0.957, 0.957); opacity: 0.383; }
      70% { transform: translate(660px, 240px) scale(0.973, 0.973); opacity: 0.389; }
      75% { transform: translate(660px, 240px) scale(0.984, 0.984); opacity: 0.394; }
      80% { transform: translate(660px, 240px) scale(0.992, 0.992); opacity: 0.397; }
      85% { transform: translate(660px, 240px) scale(0.997, 0.997); opacity: 0.399; }
      90% { transform: translate(660px, 240px) scale(0.999, 0.999); opacity: 0.4; }
      95% { transform: translate(660px, 240px) scale(1, 1); opacity: 0.4; }
      100% { transform: translate(660px, 240px); opacity: 0.4; }
    }
    @keyframes center-glow-anim-1 {
      0% { transform: translate(660px, 240px); opacity: 0.4; }
      5% { transform: translate(660px, 240px); opacity: 0.4; }
      10% { transform: translate(660px, 240px); opacity: 0.4; }
      15% { transform: translate(660px, 240px); opacity: 0.399; }
      20% { transform: translate(660px, 240px); opacity: 0.397; }
      25% { transform: translate(660px, 240px); opacity: 0.394; }
      30% { transform: translate(660px, 240px); opacity: 0.389; }
      35% { transform: translate(660px, 240px); opacity: 0.383; }
      40% { transform: translate(660px, 240px); opacity: 0.374; }
      45% { transform: translate(660px, 240px); opacity: 0.364; }
      50% { transform: translate(660px, 240px); opacity: 0.35; }
      55% { transform: translate(660px, 240px); opacity: 0.333; }
      60% { transform: translate(660px, 240px); opacity: 0.314; }
      65% { transform: translate(660px, 240px); opacity: 0.29; }
      70% { transform: translate(660px, 240px); opacity: 0.263; }
      75% { transform: translate(660px, 240px); opacity: 0.231; }
      80% { transform: translate(660px, 240px); opacity: 0.195; }
      85% { transform: translate(660px, 240px); opacity: 0.154; }
      90% { transform: translate(660px, 240px); opacity: 0.108; }
      95% { transform: translate(660px, 240px); opacity: 0.057; }
      100% { transform: translate(660px, 240px); opacity: 0; }
    }
    #center-glow {
      transform-origin: 660px 240px;
      transform: translate(660px, 240px);
      opacity: 0.4;
      animation: center-glow-anim-0 0.667s 0s linear 1 normal forwards, center-glow-anim-1 1s 1.333s linear 1 normal forwards;
    }
    @keyframes message-anim-0 {
      0% { transform: translate(160px, 400px) scale(0, 0); opacity: 0; }
      5% { transform: translate(160px, 400px) scale(0.219, 0.219); opacity: 0.219; }
      10% { transform: translate(160px, 400px) scale(0.409, 0.409); opacity: 0.409; }
      15% { transform: translate(160px, 400px) scale(0.57, 0.57); opacity: 0.57; }
      20% { transform: translate(160px, 400px) scale(0.706, 0.706); opacity: 0.706; }
      25% { transform: translate(160px, 400px) scale(0.817, 0.817); opacity: 0.817; }
      30% { transform: translate(160px, 400px) scale(0.907, 0.907); opacity: 0.907; }
      35% { transform: translate(160px, 400px) scale(0.977, 0.977); opacity: 0.977; }
      40% { transform: translate(160px, 400px) scale(1.029, 1.029); opacity: 1.029; }
      45% { transform: translate(160px, 400px) scale(1.065, 1.065); opacity: 1.065; }
      50% { transform: translate(160px, 400px) scale(1.088, 1.088); opacity: 1.088; }
      55% { transform: translate(160px, 400px) scale(1.098, 1.098); opacity: 1.098; }
      60% { transform: translate(160px, 400px) scale(1.099, 1.099); opacity: 1.099; }
      65% { transform: translate(160px, 400px) scale(1.093, 1.093); opacity: 1.093; }
      70% { transform: translate(160px, 400px) scale(1.08, 1.08); opacity: 1.08; }
      75% { transform: translate(160px, 400px) scale(1.064, 1.064); opacity: 1.064; }
      80% { transform: translate(160px, 400px) scale(1.046, 1.046); opacity: 1.046; }
      85% { transform: translate(160px, 400px) scale(1.029, 1.029); opacity: 1.029; }
      90% { transform: translate(160px, 400px) scale(1.014, 1.014); opacity: 1.014; }
      95% { transform: translate(160px, 400px) scale(1.004, 1.004); opacity: 1.004; }
      100% { transform: translate(160px, 400px); opacity: 1; }
    }
    #message {
      transform-origin: 160px 400px;
      transform: translate(160px, 400px);
      opacity: 1;
      animation: message-anim-0 1s 0.833s linear 1 normal forwards;
    }
    @keyframes subtitle-anim-0 {
      0% { transform: translate(160px, 560px); opacity: 0; }
      5% { transform: translate(160px, 560px); opacity: 0.143; }
      10% { transform: translate(160px, 560px); opacity: 0.271; }
      15% { transform: translate(160px, 560px); opacity: 0.386; }
      20% { transform: translate(160px, 560px); opacity: 0.488; }
      25% { transform: translate(160px, 560px); opacity: 0.578; }
      30% { transform: translate(160px, 560px); opacity: 0.657; }
      35% { transform: translate(160px, 560px); opacity: 0.725; }
      40% { transform: translate(160px, 560px); opacity: 0.784; }
      45% { transform: translate(160px, 560px); opacity: 0.834; }
      50% { transform: translate(160px, 560px); opacity: 0.875; }
      55% { transform: translate(160px, 560px); opacity: 0.909; }
      60% { transform: translate(160px, 560px); opacity: 0.936; }
      65% { transform: translate(160px, 560px); opacity: 0.957; }
      70% { transform: translate(160px, 560px); opacity: 0.973; }
      75% { transform: translate(160px, 560px); opacity: 0.984; }
      80% { transform: translate(160px, 560px); opacity: 0.992; }
      85% { transform: translate(160px, 560px); opacity: 0.997; }
      90% { transform: translate(160px, 560px); opacity: 0.999; }
      95% { transform: translate(160px, 560px); opacity: 1; }
      100% { transform: translate(160px, 560px); opacity: 1; }
    }
    #subtitle {
      transform-origin: 160px 560px;
      transform: translate(160px, 560px);
      opacity: 1;
      animation: subtitle-anim-0 0.833s 1.667s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="{{backgroundColor}}" />
  </g>
  <g id="center-glow">
    <ellipse cx="300" cy="300" rx="300" ry="300" fill="url(#center-glow-grad)" />
  </g>
  <!-- Unsupported layer type "custom" (explosion-particles-red) -->
  <!-- Unsupported layer type "custom" (explosion-particles-yellow) -->
  <!-- Unsupported layer type "custom" (explosion-particles-orange) -->
  <g id="message">
    <text y="120" font-family="Inter, system-ui, sans-serif" font-size="120" font-weight="900" font-style="normal" fill="#ffffff" text-anchor="middle" letter-spacing="20" filter="url(#message-shadow)"><tspan x="800" dy="0">{{message}}</tspan></text>
  </g>
  <g id="subtitle">
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="600" font-style="normal" fill="#cccccc" text-anchor="middle" letter-spacing="8"><tspan x="800" dy="0">{{subtitle}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>