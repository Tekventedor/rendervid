<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="title-shadow"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(0, 0, 0, 0.5)" /></filter>
    <filter id="subtitle-shadow"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="rgba(0, 0, 0, 0.4)" /></filter>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    @keyframes title-anim-0 {
      0% { transform: translate(160px, 420px) scale(0, 0); opacity: 0; }
      5% { transform: translate(160px, 420px) scale(0.219, 0.219); opacity: 0.219; }
      10% { transform: translate(160px, 420px) scale(0.409, 0.409); opacity: 0.409; }
      15% { transform: translate(160px, 420px) scale(0.57, 0.57); opacity: 0.57; }
      20% { transform: translate(160px, 420px) scale(0.706, 0.706); opacity: 0.706; }
      25% { transform: translate(160px, 420px) scale(0.817, 0.817); opacity: 0.817; }
      30% { transform: translate(160px, 420px) scale(0.907, 0.907); opacity: 0.907; }
      35% { transform: translate(160px, 420px) scale(0.977, 0.977); opacity: 0.977; }
      40% { transform: translate(160px, 420px) scale(1.029, 1.029); opacity: 1.029; }
      45% { transform: translate(160px, 420px) scale(1.065, 1.065); opacity: 1.065; }
      50% { transform: translate(160px, 420px) scale(1.088, 1.088); opacity: 1.088; }
      55% { transform: translate(160px, 420px) scale(1.098, 1.098); opacity: 1.098; }
      60% { transform: translate(160px, 420px) scale(1.099, 1.099); opacity: 1.099; }
      65% { transform: translate(160px, 420px) scale(1.093, 1.093); opacity: 1.093; }
      70% { transform: translate(160px, 420px) scale(1.08, 1.08); opacity: 1.08; }
      75% { transform: translate(160px, 420px) scale(1.064, 1.064); opacity: 1.064; }
      80% { transform: translate(160px, 420px) scale(1.046, 1.046); opacity: 1.046; }
      85% { transform: translate(160px, 420px) scale(1.029, 1.029); opacity: 1.029; }
      90% { transform: translate(160px, 420px) scale(1.014, 1.014); opacity: 1.014; }
      95% { transform: translate(160px, 420px) scale(1.004, 1.004); opacity: 1.004; }
      100% { transform: translate(160px, 420px); opacity: 1; }
    }
    #title {
      transform-origin: 160px 420px;
      transform: translate(160px, 420px);
      opacity: 1;
      animation: title-anim-0 1.167s 1.5s linear 1 normal forwards;
    }
    @keyframes subtitle-anim-0 {
      0% { transform: translate(160px, 560px); opacity: 0; }
      5% { transform: translate(160px, 560px); opacity: 0.143; }
      10% { transform: translate(160px, 560px); opacity: 0.271; }
      15% { transform: translate(160px, 560px); opacity: 0.386; }
      20% { transform: translate(160px, 560px); opacity: 0.488; }
      25% { transform: translate(160px, 560px); opacity: 0.578; }
      30% { transform: translate(160px, 560px); opacity: 0.657; }
      35% { transform: translate(160px, 560px); opacity: 0.725; }
      40% { transform: translate(160px, 560px); opacity: 0.784; }
      45% { transform: translate(160px, 560px); opacity: 0.834; }
      50% { transform: translate(160px, 560px); opacity: 0.875; }
      55% { transform: translate(160px, 560px); opacity: 0.909; }
      60% { transform: translate(160px, 560px); opacity: 0.936; }
      65% { transform: translate(160px, 560px); opacity: 0.957; }
      70% { transform: translate(160px, 560px); opacity: 0.973; }
      75% { transform: translate(160px, 560px); opacity: 0.984; }
      80% { transform: translate(160px, 560px); opacity: 0.992; }
      85% { transform: translate(160px, 560px); opacity: 0.997; }
      90% { transform: translate(160px, 560px); opacity: 0.999; }
      95% { transform: translate(160px, 560px); opacity: 1; }
      100% { transform: translate(160px, 560px); opacity: 1; }
    }
    #subtitle {
      transform-origin: 160px 560px;
      transform: translate(160px, 560px);
      opacity: 1;
      animation: subtitle-anim-0 1s 2.5s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <!-- Unsupported layer type "custom" (aurora-bg) -->
  <!-- Unsupported layer type "custom" (particles) -->
  <g id="title">
    <text y="96" font-family="Inter, system-ui, sans-serif" font-size="96" font-weight="800" font-style="normal" fill="#ffffff" text-anchor="middle" letter-spacing="12" filter="url(#title-shadow)"><tspan x="800" dy="0">{{title}}</tspan></text>
  </g>
  <g id="subtitle">
    <text y="32" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="normal" font-style="normal" fill="#e0e0e0" text-anchor="middle" letter-spacing="6" filter="url(#subtitle-shadow)"><tspan x="800" dy="0">{{subtitle}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>