      10% { transform: translate(1530px, 480px) rotate(-131.22deg); opacity: 0.163; }
      15% { transform: translate(1530px, 480px) rotate(-110.542deg); opacity: 0.232; }
      20% { transform: translate(1530px, 480px) rotate(-92.16deg); opacity: 0.293; }
      25% { transform: translate(1530px, 480px) rotate(-75.937deg); opacity: 0.347; }
