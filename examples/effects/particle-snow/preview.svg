      5% { transform: translate(260px, 380px); opacity: 0.021; }
      10% { transform: translate(260px, 380px); opacity: 0.041; }
      15% { transform: translate(260px, 380px); opacity: 0.058; }
      20% { transform: translate(260px, 380px); opacity: 0.073; }
