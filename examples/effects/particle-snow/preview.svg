      60% { transform: translate(1530px, 480px) rotate(-11.52deg); opacity: 0.562; }
      65% { transform: translate(1530px, 480px) rotate(-7.718deg); opacity: 0.574; }
      70% { transform: translate(1530px, 480px) rotate(-4.86deg); opacity: 0.584; }
      75% { transform: translate(1530px, 480px) rotate(-2.812deg); opacity: 0.591; }
      80% { transform: translate(1530px, 480px) rotate(-1.44deg); opacity: 0.595; }
      85% { transform: translate(1530px, 480px) rotate(-0.608deg); opacity: 0.598; }
      90% { transform: translate(1530px, 480px) rotate(-0.18deg); opacity: 0.599; }
      95% { transform: translate(1530px, 480px) rotate(-0.023deg); opacity: 0.6; }
      100% { transform: translate(1530px, 480px); opacity: 0.6; }
