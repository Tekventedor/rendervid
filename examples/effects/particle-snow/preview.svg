      40% { transform: translate(1530px, 480px) rotate(-38.88deg); opacity: 0.47; }
      45% { transform: translate(1530px, 480px) rotate(-29.948deg); opacity: 0.5; }
      50% { transform: translate(1530px, 480px) rotate(-22.5deg); opacity: 0.525; }
