<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <linearGradient id="background-grad" x1="100%" y1="50%" x2="0%" y2="50%"><stop offset="0%" stop-color="{{backgroundColor}}" /><stop offset="100%" stop-color="#0f1419" /></linearGradient>
    <filter id="message-shadow"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(0, 0, 0, 0.5)" /></filter>
    <filter id="subtitle-shadow"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="rgba(0, 0, 0, 0.4)" /></filter>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes content-background-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #content-background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.15;
      animation: content-background-anim-0 1.167s 1s linear 1 normal forwards;
    }
    @keyframes message-anim-0 {
      0% { transform: translate(0px, -1080px); }
      5% { transform: translate(0px, -925.965px); }
      10% { transform: translate(0px, -787.32px); }
      15% { transform: translate(0px, -663.255px); }
      20% { transform: translate(0px, -552.96px); }
      25% { transform: translate(0px, -455.625px); }
      30% { transform: translate(0px, -370.44px); }
      35% { transform: translate(0px, -296.595px); }
      40% { transform: translate(0px, -233.28px); }
      45% { transform: translate(0px, -179.685px); }
      50% { transform: translate(0px, -135px); }
      55% { transform: translate(0px, -98.415px); }
      60% { transform: translate(0px, -69.12px); }
      65% { transform: translate(0px, -46.305px); }
      70% { transform: translate(0px, -29.16px); }
      75% { transform: translate(0px, -16.875px); }
      80% { transform: translate(0px, -8.64px); }
      85% { transform: translate(0px, -3.645px); }
      90% { transform: translate(0px, -1.08px); }
      95% { transform: translate(0px, -0.135px); }
      100% { transform: translate(0px, 0px); }
    }
    #message {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: message-anim-0 1.167s 1.5s linear 1 normal forwards;
    }
    @keyframes subtitle-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #subtitle {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: subtitle-anim-0 1s 2.333s linear 1 normal forwards;
    }
    @keyframes decorative-snowflake-left-anim-0 {
