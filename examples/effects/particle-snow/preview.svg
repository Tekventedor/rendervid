<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <linearGradient id="background-grad" x1="100%" y1="50%" x2="0%" y2="50%"><stop offset="0%" stop-color="{{backgroundColor}}" /><stop offset="100%" stop-color="#0f1419" /></linearGradient>
    <filter id="message-shadow"><feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(0, 0, 0, 0.5)" /></filter>
    <filter id="subtitle-shadow"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="rgba(0, 0, 0, 0.4)" /></filter>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
