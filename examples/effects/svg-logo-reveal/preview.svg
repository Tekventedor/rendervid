<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes title-anim-0 {
      0% { transform: translate(460px, 1960px); opacity: 1; }
      5% { transform: translate(460px, 1805.965px); opacity: 1; }
      10% { transform: translate(460px, 1667.32px); opacity: 1; }
      15% { transform: translate(460px, 1543.255px); opacity: 1; }
      20% { transform: translate(460px, 1432.96px); opacity: 1; }
      25% { transform: translate(460px, 1335.625px); opacity: 1; }
      30% { transform: translate(460px, 1250.44px); opacity: 1; }
      35% { transform: translate(460px, 1176.595px); opacity: 1; }
      40% { transform: translate(460px, 1113.28px); opacity: 1; }
      45% { transform: translate(460px, 1059.685px); opacity: 1; }
      50% { transform: translate(460px, 1015px); opacity: 1; }
      55% { transform: translate(460px, 978.415px); opacity: 1; }
      60% { transform: translate(460px, 949.12px); opacity: 1; }
      65% { transform: translate(460px, 926.305px); opacity: 1; }
      70% { transform: translate(460px, 909.16px); opacity: 1; }
      75% { transform: translate(460px, 896.875px); opacity: 1; }
      80% { transform: translate(460px, 888.64px); opacity: 1; }
      85% { transform: translate(460px, 883.645px); opacity: 1; }
      90% { transform: translate(460px, 881.08px); opacity: 1; }
      95% { transform: translate(460px, 880.135px); opacity: 1; }
      100% { transform: translate(460px, 880px); opacity: 1; }
    }
    #title {
      transform-origin: 460px 880px;
      transform: translate(460px, 880px);
      opacity: 1;
      animation: title-anim-0 0.667s 2.667s linear 1 normal forwards;
    }
    @keyframes subtitle-anim-0 {
      0% { transform: translate(660px, 970px); opacity: 0; }
      5% { transform: translate(660px, 970px); opacity: 0.143; }
      10% { transform: translate(660px, 970px); opacity: 0.271; }
      15% { transform: translate(660px, 970px); opacity: 0.386; }
      20% { transform: translate(660px, 970px); opacity: 0.488; }
      25% { transform: translate(660px, 970px); opacity: 0.578; }
      30% { transform: translate(660px, 970px); opacity: 0.657; }
      35% { transform: translate(660px, 970px); opacity: 0.725; }
      40% { transform: translate(660px, 970px); opacity: 0.784; }
      45% { transform: translate(660px, 970px); opacity: 0.834; }
      50% { transform: translate(660px, 970px); opacity: 0.875; }
      55% { transform: translate(660px, 970px); opacity: 0.909; }
      60% { transform: translate(660px, 970px); opacity: 0.936; }
      65% { transform: translate(660px, 970px); opacity: 0.957; }
      70% { transform: translate(660px, 970px); opacity: 0.973; }
      75% { transform: translate(660px, 970px); opacity: 0.984; }
      80% { transform: translate(660px, 970px); opacity: 0.992; }
      85% { transform: translate(660px, 970px); opacity: 0.997; }
      90% { transform: translate(660px, 970px); opacity: 0.999; }
      95% { transform: translate(660px, 970px); opacity: 1; }
      100% { transform: translate(660px, 970px); opacity: 1; }
    }
    #subtitle {
      transform-origin: 660px 970px;
      transform: translate(660px, 970px);
      opacity: 1;
      animation: subtitle-anim-0 0.5s 3.167s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="{{backgroundColor}}" />
  </g>
  <g id="title">
    <text y="68" font-family="sans-serif" font-size="68" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle" letter-spacing="10"><tspan x="500" dy="0">{{title}}</tspan></text>
  </g>
  <g id="subtitle">
    <text y="24" font-family="sans-serif" font-size="24" font-weight="normal" font-style="normal" fill="{{strokeColor}}" text-anchor="middle" letter-spacing="2"><tspan x="300" dy="0">Animated Logo Reveal</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>