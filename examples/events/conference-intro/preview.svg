  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#1e293b" />
  </g>
  <g id="featured-image">
    <image href="{{speakerImage}}" width="1920" height="700" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="accent">
    <rect x="0" y="0" width="20" height="1080" rx="0" ry="0" fill="#3b82f6" />
  </g>
  <g id="conference">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="600" font-style="normal" fill="#3b82f6" text-anchor="start"><tspan x="0" dy="0">{{conferenceName}}</tspan></text>
  </g>
  <g id="name">
    <text y="72" font-family="sans-serif" font-size="72" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="start"><tspan x="0" dy="0">{{speakerName}}</tspan></text>
  </g>
  <g id="title">
