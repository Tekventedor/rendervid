  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1080" height="1080" rx="0" ry="0" fill="#1e293b" />
  </g>
  <g id="header">
    <text y="48" font-family="sans-serif" font-size="48" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="450" dy="0">{{header}}</tspan></text>
  </g>
  <g id="period">
    <text y="24" font-family="sans-serif" font-size="24" font-weight="normal" font-style="normal" fill="#94a3b8" text-anchor="middle"><tspan x="300" dy="0">{{period}}</tspan></text>
  </g>
  <g id="stat-bg">
    <rect x="0" y="0" width="500" height="250" rx="0" ry="0" fill="#22c55e" />
  </g>
  <g id="stat-value">
    <text y="80" font-family="sans-serif" font-size="80" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="225" dy="0">{{mainStatValue}}</tspan></text>
  </g>
  <g id="stat-label">
