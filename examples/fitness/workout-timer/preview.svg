  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1080" height="1920" rx="0" ry="0" fill="#0f172a" />
  </g>
  <g id="accent">
    <rect x="0" y="0" width="500" height="500" rx="0" ry="0" fill="#22c55e" />
  </g>
  <g id="round">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="600" font-style="normal" fill="#22c55e" text-anchor="middle"><tspan x="400" dy="0">{{roundLabel}}</tspan></text>
  </g>
  <g id="exercise">
    <text y="72" font-family="sans-serif" font-size="72" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="450" dy="0">{{exerciseName}}</tspan></text>
  </g>
  <g id="timer">
    <text y="140" font-family="sans-serif" font-size="140" font-weight="bold" font-style="normal" fill="#22c55e" text-anchor="middle"><tspan x="250" dy="0">{{timerDisplay}}</tspan></text>
  </g>
  <g id="next-label">
