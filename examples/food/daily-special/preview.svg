  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1080" height="1920" rx="0" ry="0" fill="#fef3c7" />
  </g>
  <g id="food-image">
    <image href="{{foodImage}}" width="800" height="600" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="badge-bg">
    <rect x="0" y="0" width="300" height="80" rx="0" ry="0" fill="#dc2626" />
  </g>
  <g id="badge">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="150" dy="0">{{badgeText}}</tspan></text>
  </g>
  <g id="content-bg">
    <rect x="0" y="0" width="1080" height="920" rx="0" ry="0" fill="#ffffff" />
  </g>
  <g id="day">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="600" font-style="normal" fill="#d97706" text-anchor="middle"><tspan x="300" dy="0">{{day}}</tspan></text>
  </g>
  <g id="name">
    <text y="56" font-family="sans-serif" font-size="56" font-weight="bold" font-style="normal" fill="#1f2937" text-anchor="middle"><tspan x="450" dy="0">{{dishName}}</tspan></text>
  </g>
  <g id="price-bg">
    <rect x="0" y="0" width="400" height="120" rx="0" ry="0" fill="#16a34a" />
  </g>
  <g id="price">
    <text y="48" font-family="sans-serif" font-size="48" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="175" dy="0">{{price}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
