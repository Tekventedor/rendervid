<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <rect width="1080" height="1080" fill="#000000" />
  <defs>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes food-image-anim-0 {
      0% { transform: scale(0, 0); opacity: 0; }
      5% { transform: scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: scale(1, 1); opacity: 1; }
      100% { transform: scale(1, 1); opacity: 1; }
    }
    #food-image {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: food-image-anim-0 0.833s 0s linear 1 normal forwards;
    }
    @keyframes category-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #category {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: category-anim-0 0.667s 0.833s linear 1 normal forwards;
    }
    @keyframes name-anim-0 {
      0% { transform: translate(0px, 1080px); }
      5% { transform: translate(0px, 925.965px); }
      10% { transform: translate(0px, 787.32px); }
      15% { transform: translate(0px, 663.255px); }
      20% { transform: translate(0px, 552.96px); }
      25% { transform: translate(0px, 455.625px); }
      30% { transform: translate(0px, 370.44px); }
      35% { transform: translate(0px, 296.595px); }
      40% { transform: translate(0px, 233.28px); }
      45% { transform: translate(0px, 179.685px); }
      50% { transform: translate(0px, 135px); }
      55% { transform: translate(0px, 98.415px); }
      60% { transform: translate(0px, 69.12px); }
      65% { transform: translate(0px, 46.305px); }
      70% { transform: translate(0px, 29.16px); }
      75% { transform: translate(0px, 16.875px); }
      80% { transform: translate(0px, 8.64px); }
      85% { transform: translate(0px, 3.645px); }
      90% { transform: translate(0px, 1.08px); }
      95% { transform: translate(0px, 0.135px); }
      100% { transform: translate(0px, 0px); }
    }
    #name {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: name-anim-0 0.833s 1.167s linear 1 normal forwards;
    }
    @keyframes desc-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #desc {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: desc-anim-0 0.667s 1.667s linear 1 normal forwards;
    }
    @keyframes price-anim-0 {
      0% { transform: scale(0, 0); opacity: 0; }
      5% { transform: scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: scale(1, 1); opacity: 1; }
      100% { transform: scale(1, 1); opacity: 1; }
    }
    #price {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: price-anim-0 0.667s 2s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1080" height="1080" rx="0" ry="0" fill="#1c1917" />
  </g>
  <g id="food-image" transform="translate(140, 100)">
    <image href="{{foodImage}}" width="800" height="500" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="category" transform="translate(340, 720)">
    <text y="20" font-family="sans-serif" font-size="20" font-weight="600" font-style="normal" fill="#d97706" text-anchor="middle"><tspan x="200" dy="0">{{category}}</tspan></text>
  </g>
  <g id="name" transform="translate(90, 800)">
    <text y="48" font-family="sans-serif" font-size="48" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="450" dy="0">{{dishName}}</tspan></text>
  </g>
  <g id="desc" transform="translate(140, 900)">
    <text y="22" font-family="sans-serif" font-size="22" font-weight="normal" font-style="normal" fill="#a8a29e" text-anchor="middle"><tspan x="400" dy="0">{{description}}</tspan></text>
  </g>
  <g id="price" transform="translate(390, 990)">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="bold" font-style="normal" fill="#d97706" text-anchor="middle"><tspan x="150" dy="0">{{price}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>