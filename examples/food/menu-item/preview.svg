<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <rect width="1080" height="1080" fill="#000000" />
  <defs>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes food-image-anim-0 {
      0% { transform: translate(140px, 100px) scale(0, 0); opacity: 0; }
      5% { transform: translate(140px, 100px) scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: translate(140px, 100px) scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: translate(140px, 100px) scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: translate(140px, 100px) scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: translate(140px, 100px) scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: translate(140px, 100px) scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: translate(140px, 100px) scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: translate(140px, 100px) scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: translate(140px, 100px) scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: translate(140px, 100px) scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: translate(140px, 100px) scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: translate(140px, 100px) scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: translate(140px, 100px) scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: translate(140px, 100px) scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: translate(140px, 100px) scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: translate(140px, 100px) scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: translate(140px, 100px) scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: translate(140px, 100px) scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: translate(140px, 100px) scale(1, 1); opacity: 1; }
      100% { transform: translate(140px, 100px); opacity: 1; }
    }
    #food-image {
      transform-origin: 140px 100px;
      transform: translate(140px, 100px);
      opacity: 1;
      animation: food-image-anim-0 0.833s 0s linear 1 normal forwards;
    }
    @keyframes category-anim-0 {
      0% { transform: translate(340px, 720px); opacity: 0; }
      5% { transform: translate(340px, 720px); opacity: 0.143; }
      10% { transform: translate(340px, 720px); opacity: 0.271; }
      15% { transform: translate(340px, 720px); opacity: 0.386; }
      20% { transform: translate(340px, 720px); opacity: 0.488; }
      25% { transform: translate(340px, 720px); opacity: 0.578; }
      30% { transform: translate(340px, 720px); opacity: 0.657; }
      35% { transform: translate(340px, 720px); opacity: 0.725; }
      40% { transform: translate(340px, 720px); opacity: 0.784; }
      45% { transform: translate(340px, 720px); opacity: 0.834; }
      50% { transform: translate(340px, 720px); opacity: 0.875; }
      55% { transform: translate(340px, 720px); opacity: 0.909; }
      60% { transform: translate(340px, 720px); opacity: 0.936; }
      65% { transform: translate(340px, 720px); opacity: 0.957; }
      70% { transform: translate(340px, 720px); opacity: 0.973; }
      75% { transform: translate(340px, 720px); opacity: 0.984; }
      80% { transform: translate(340px, 720px); opacity: 0.992; }
      85% { transform: translate(340px, 720px); opacity: 0.997; }
      90% { transform: translate(340px, 720px); opacity: 0.999; }
      95% { transform: translate(340px, 720px); opacity: 1; }
      100% { transform: translate(340px, 720px); opacity: 1; }
    }
    #category {
      transform-origin: 340px 720px;
      transform: translate(340px, 720px);
      opacity: 1;
      animation: category-anim-0 0.667s 0.833s linear 1 normal forwards;
    }
    @keyframes name-anim-0 {
      0% { transform: translate(90px, 1880px); opacity: 1; }
      5% { transform: translate(90px, 1725.965px); opacity: 1; }
      10% { transform: translate(90px, 1587.32px); opacity: 1; }
      15% { transform: translate(90px, 1463.255px); opacity: 1; }
      20% { transform: translate(90px, 1352.96px); opacity: 1; }
      25% { transform: translate(90px, 1255.625px); opacity: 1; }
      30% { transform: translate(90px, 1170.44px); opacity: 1; }
      35% { transform: translate(90px, 1096.595px); opacity: 1; }
      40% { transform: translate(90px, 1033.28px); opacity: 1; }
      45% { transform: translate(90px, 979.685px); opacity: 1; }
      50% { transform: translate(90px, 935px); opacity: 1; }
      55% { transform: translate(90px, 898.415px); opacity: 1; }
      60% { transform: translate(90px, 869.12px); opacity: 1; }
      65% { transform: translate(90px, 846.305px); opacity: 1; }
      70% { transform: translate(90px, 829.16px); opacity: 1; }
      75% { transform: translate(90px, 816.875px); opacity: 1; }
      80% { transform: translate(90px, 808.64px); opacity: 1; }
      85% { transform: translate(90px, 803.645px); opacity: 1; }
      90% { transform: translate(90px, 801.08px); opacity: 1; }
      95% { transform: translate(90px, 800.135px); opacity: 1; }
      100% { transform: translate(90px, 800px); opacity: 1; }
    }
    #name {
      transform-origin: 90px 800px;
      transform: translate(90px, 800px);
      opacity: 1;
      animation: name-anim-0 0.833s 1.167s linear 1 normal forwards;
    }
    @keyframes desc-anim-0 {
      0% { transform: translate(140px, 900px); opacity: 0; }
      5% { transform: translate(140px, 900px); opacity: 0.143; }
      10% { transform: translate(140px, 900px); opacity: 0.271; }
      15% { transform: translate(140px, 900px); opacity: 0.386; }
      20% { transform: translate(140px, 900px); opacity: 0.488; }
      25% { transform: translate(140px, 900px); opacity: 0.578; }
      30% { transform: translate(140px, 900px); opacity: 0.657; }
      35% { transform: translate(140px, 900px); opacity: 0.725; }
      40% { transform: translate(140px, 900px); opacity: 0.784; }
      45% { transform: translate(140px, 900px); opacity: 0.834; }
      50% { transform: translate(140px, 900px); opacity: 0.875; }
      55% { transform: translate(140px, 900px); opacity: 0.909; }
      60% { transform: translate(140px, 900px); opacity: 0.936; }
      65% { transform: translate(140px, 900px); opacity: 0.957; }
      70% { transform: translate(140px, 900px); opacity: 0.973; }
      75% { transform: translate(140px, 900px); opacity: 0.984; }
      80% { transform: translate(140px, 900px); opacity: 0.992; }
      85% { transform: translate(140px, 900px); opacity: 0.997; }
      90% { transform: translate(140px, 900px); opacity: 0.999; }
      95% { transform: translate(140px, 900px); opacity: 1; }
      100% { transform: translate(140px, 900px); opacity: 1; }
    }
    #desc {
      transform-origin: 140px 900px;
      transform: translate(140px, 900px);
      opacity: 1;
      animation: desc-anim-0 0.667s 1.667s linear 1 normal forwards;
    }
    @keyframes price-anim-0 {
      0% { transform: translate(390px, 990px) scale(0, 0); opacity: 0; }
      5% { transform: translate(390px, 990px) scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: translate(390px, 990px) scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: translate(390px, 990px) scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: translate(390px, 990px) scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: translate(390px, 990px) scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: translate(390px, 990px) scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: translate(390px, 990px) scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: translate(390px, 990px) scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: translate(390px, 990px) scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: translate(390px, 990px) scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: translate(390px, 990px) scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: translate(390px, 990px) scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: translate(390px, 990px) scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: translate(390px, 990px) scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: translate(390px, 990px) scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: translate(390px, 990px) scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: translate(390px, 990px) scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: translate(390px, 990px) scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: translate(390px, 990px) scale(1, 1); opacity: 1; }
      100% { transform: translate(390px, 990px); opacity: 1; }
    }
    #price {
      transform-origin: 390px 990px;
      transform: translate(390px, 990px);
      opacity: 1;
      animation: price-anim-0 0.667s 2s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1080" height="1080" rx="0" ry="0" fill="#1c1917" />
  </g>
  <g id="food-image">
    <image href="{{foodImage}}" width="800" height="500" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="category">
    <text y="20" font-family="sans-serif" font-size="20" font-weight="600" font-style="normal" fill="#d97706" text-anchor="middle"><tspan x="200" dy="0">{{category}}</tspan></text>
  </g>
  <g id="name">
    <text y="48" font-family="sans-serif" font-size="48" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="450" dy="0">{{dishName}}</tspan></text>
  </g>
  <g id="desc">
    <text y="22" font-family="sans-serif" font-size="22" font-weight="normal" font-style="normal" fill="#a8a29e" text-anchor="middle"><tspan x="400" dy="0">{{description}}</tspan></text>
  </g>
  <g id="price">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="bold" font-style="normal" fill="#d97706" text-anchor="middle"><tspan x="150" dy="0">{{price}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>