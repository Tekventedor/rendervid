  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#1c1917" />
  </g>
  <g id="food-image">
    <image href="{{foodImage}}" width="800" height="900" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="card-bg">
    <rect x="0" y="0" width="920" height="800" rx="20" ry="20" fill="#ffffff" />
  </g>
  <g id="category">
    <text y="24" font-family="sans-serif" font-size="24" font-weight="600" font-style="normal" fill="#d97706" text-anchor="middle"><tspan x="410" dy="0">{{category}}</tspan></text>
  </g>
  <g id="name">
    <text y="64" font-family="sans-serif" font-size="64" font-weight="bold" font-style="normal" fill="#1f2937" text-anchor="middle"><tspan x="410" dy="0">{{recipeName}}</tspan></text>
  </g>
  <g id="divider">
    <rect x="0" y="0" width="500" height="4" rx="0" ry="0" fill="#d97706" />
  </g>
  <g id="prep-icon">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="500" font-style="normal" fill="#6b7280" text-anchor="middle"><tspan x="175" dy="0">{{prepTime}}</tspan></text>
  </g>
  <g id="cook-icon">
