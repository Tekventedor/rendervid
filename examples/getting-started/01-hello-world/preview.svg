<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes message-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    @keyframes message-anim-1 {
      0% { transform: scale(1, 1); }
      5% { transform: scale(1.002, 1.002); }
      10% { transform: scale(1.01, 1.01); }
      15% { transform: scale(1.021, 1.021); }
      20% { transform: scale(1.035, 1.035); }
      25% { transform: scale(1.05, 1.05); }
      30% { transform: scale(1.065, 1.065); }
      35% { transform: scale(1.079, 1.079); }
      40% { transform: scale(1.09, 1.09); }
      45% { transform: scale(1.098, 1.098); }
      50% { transform: scale(1.1, 1.1); }
      55% { transform: scale(1.098, 1.098); }
      60% { transform: scale(1.09, 1.09); }
      65% { transform: scale(1.079, 1.079); }
      70% { transform: scale(1.065, 1.065); }
      75% { transform: scale(1.05, 1.05); }
      80% { transform: scale(1.035, 1.035); }
      85% { transform: scale(1.021, 1.021); }
      90% { transform: scale(1.01, 1.01); }
      95% { transform: scale(1.002, 1.002); }
      100% { transform: scale(1, 1); }
    }
    #message {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: message-anim-0 1s 0s linear 1 normal forwards, message-anim-1 1s 1.5s linear 1 normal none;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="{{backgroundColor}}" />
  </g>
  <g id="message" transform="translate(160, 440)">
    <text y="96" font-family="Inter, system-ui, sans-serif" font-size="96" font-weight="bold" font-style="normal" fill="{{textColor}}" text-anchor="middle"><tspan x="800" dy="0">{{message}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>