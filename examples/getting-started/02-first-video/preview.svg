<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <linearGradient id="background-grad" x1="85.355%" y1="85.355%" x2="14.645%" y2="14.645%"><stop offset="0%" stop-color="{{backgroundColor}}" /><stop offset="100%" stop-color="#1e293b" /></linearGradient>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes accent-line-top-anim-0 {
      0% { transform: translate(-1920px, 0px); }
      5% { transform: translate(-1646.16px, 0px); }
      10% { transform: translate(-1399.68px, 0px); }
      15% { transform: translate(-1179.12px, 0px); }
      20% { transform: translate(-983.04px, 0px); }
      25% { transform: translate(-810px, 0px); }
      30% { transform: translate(-658.56px, 0px); }
      35% { transform: translate(-527.28px, 0px); }
      40% { transform: translate(-414.72px, 0px); }
      45% { transform: translate(-319.44px, 0px); }
      50% { transform: translate(-240px, 0px); }
      55% { transform: translate(-174.96px, 0px); }
      60% { transform: translate(-122.88px, 0px); }
      65% { transform: translate(-82.32px, 0px); }
      70% { transform: translate(-51.84px, 0px); }
      75% { transform: translate(-30px, 0px); }
      80% { transform: translate(-15.36px, 0px); }
      85% { transform: translate(-6.48px, 0px); }
      90% { transform: translate(-1.92px, 0px); }
      95% { transform: translate(-0.24px, 0px); }
      100% { transform: translate(0px, 0px); }
    }
    #accent-line-top {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: accent-line-top-anim-0 0.667s 0s linear 1 normal forwards;
    }
    @keyframes accent-circle-anim-0 {
      0% { transform: scale(0, 0); opacity: 0; }
      5% { transform: scale(0.219, 0.219); opacity: 0.219; }
      10% { transform: scale(0.409, 0.409); opacity: 0.409; }
      15% { transform: scale(0.57, 0.57); opacity: 0.57; }
      20% { transform: scale(0.706, 0.706); opacity: 0.706; }
      25% { transform: scale(0.817, 0.817); opacity: 0.817; }
      30% { transform: scale(0.907, 0.907); opacity: 0.907; }
      35% { transform: scale(0.977, 0.977); opacity: 0.977; }
      40% { transform: scale(1.029, 1.029); opacity: 1.029; }
      45% { transform: scale(1.065, 1.065); opacity: 1.065; }
      50% { transform: scale(1.088, 1.088); opacity: 1.088; }
      55% { transform: scale(1.098, 1.098); opacity: 1.098; }
      60% { transform: scale(1.099, 1.099); opacity: 1.099; }
      65% { transform: scale(1.093, 1.093); opacity: 1.093; }
      70% { transform: scale(1.08, 1.08); opacity: 1.08; }
      75% { transform: scale(1.064, 1.064); opacity: 1.064; }
      80% { transform: scale(1.046, 1.046); opacity: 1.046; }
      85% { transform: scale(1.029, 1.029); opacity: 1.029; }
      90% { transform: scale(1.014, 1.014); opacity: 1.014; }
      95% { transform: scale(1.004, 1.004); opacity: 1.004; }
      100% { transform: scale(1, 1); opacity: 1; }
    }
    #accent-circle {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.1;
      animation: accent-circle-anim-0 1.333s 0.333s linear 1 normal forwards;
    }
    @keyframes title-anim-0 {
      0% { transform: translate(0px, 1080px); }
      5% { transform: translate(0px, 925.965px); }
      10% { transform: translate(0px, 787.32px); }
      15% { transform: translate(0px, 663.255px); }
      20% { transform: translate(0px, 552.96px); }
      25% { transform: translate(0px, 455.625px); }
      30% { transform: translate(0px, 370.44px); }
      35% { transform: translate(0px, 296.595px); }
      40% { transform: translate(0px, 233.28px); }
      45% { transform: translate(0px, 179.685px); }
      50% { transform: translate(0px, 135px); }
      55% { transform: translate(0px, 98.415px); }
      60% { transform: translate(0px, 69.12px); }
      65% { transform: translate(0px, 46.305px); }
      70% { transform: translate(0px, 29.16px); }
      75% { transform: translate(0px, 16.875px); }
      80% { transform: translate(0px, 8.64px); }
      85% { transform: translate(0px, 3.645px); }
      90% { transform: translate(0px, 1.08px); }
      95% { transform: translate(0px, 0.135px); }
      100% { transform: translate(0px, 0px); }
    }
    #title {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: title-anim-0 0.833s 0.5s linear 1 normal forwards;
    }
    @keyframes subtitle-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #subtitle {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: subtitle-anim-0 0.833s 1.167s linear 1 normal forwards;
    }
    @keyframes accent-line-bottom-anim-0 {
      0% { transform: scale(0, 0); opacity: 0; }
      5% { transform: scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: scale(1, 1); opacity: 1; }
      100% { transform: scale(1, 1); opacity: 1; }
    }
    #accent-line-bottom {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: accent-line-bottom-anim-0 0.667s 1.667s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="url(#background-grad)" />
  </g>
  <g id="accent-line-top" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="4" rx="0" ry="0" fill="{{primaryColor}}" />
  </g>
  <g id="accent-circle" transform="translate(1600, 700)">
    <ellipse cx="250" cy="250" rx="250" ry="250" fill="{{primaryColor}}" />
  </g>
  <g id="title" transform="translate(120, 420)">
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="bold" font-style="normal" fill="#f8fafc" text-anchor="middle"><tspan x="840" dy="0">{{title}}</tspan></text>
  </g>
  <g id="subtitle" transform="translate(120, 560)">
    <text y="32" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="normal" font-style="normal" fill="#94a3b8" text-anchor="middle"><tspan x="840" dy="0">{{subtitle}}</tspan></text>
  </g>
  <g id="accent-line-bottom" transform="translate(760, 650)">
    <rect x="0" y="0" width="400" height="3" rx="0" ry="0" fill="{{primaryColor}}" />
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>