  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="url(#background-grad)" />
  </g>
  <g id="accent-line-top">
    <rect x="0" y="0" width="1920" height="4" rx="0" ry="0" fill="{{primaryColor}}" />
  </g>
  <g id="accent-circle">
    <ellipse cx="250" cy="250" rx="250" ry="250" fill="{{primaryColor}}" />
  </g>
  <g id="title">
    <text y="80" font-family="Inter, system-ui, sans-serif" font-size="80" font-weight="bold" font-style="normal" fill="#f8fafc" text-anchor="middle"><tspan x="840" dy="0">{{title}}</tspan></text>
  </g>
  <g id="subtitle">
    <text y="32" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="normal" font-style="normal" fill="#94a3b8" text-anchor="middle"><tspan x="840" dy="0">{{subtitle}}</tspan></text>
  </g>
  <g id="accent-line-bottom">
    <rect x="0" y="0" width="400" height="3" rx="0" ry="0" fill="{{primaryColor}}" />
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
