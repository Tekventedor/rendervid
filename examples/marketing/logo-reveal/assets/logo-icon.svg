<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="80" stroke="url(#logoGrad)" stroke-width="8" fill="none" filter="url(#glow)"/>
  <!-- Inner hexagon -->
  <polygon points="100,30 155,60 155,120 100,150 45,120 45,60" fill="url(#logoGrad)" opacity="0.9"/>
  <!-- Center shape -->
  <polygon points="100,50 140,75 140,105 100,130 60,105 60,75" fill="#030712" opacity="0.8"/>
  <!-- Inner triangle -->
  <polygon points="100,65 125,90 100,115 75,90" fill="url(#logoGrad)" opacity="0.7"/>
</svg>
