<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="saleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="saleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#ef4444" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Starburst background -->
  <polygon points="60,5 70,35 100,25 80,50 105,70 70,65 60,100 50,65 15,70 40,50 20,25 50,35" fill="url(#saleGrad)" filter="url(#saleShadow)"/>
  <!-- Inner circle -->
  <circle cx="60" cy="52" r="30" fill="#fff" opacity="0.95"/>
  <!-- Percentage text would go here in actual use -->
  <text x="60" y="48" text-anchor="middle" fill="#ef4444" font-size="16" font-weight="bold">50%</text>
  <text x="60" y="62" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold">OFF</text>
</svg>
