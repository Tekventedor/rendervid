  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#1e3a5f" />
  </g>
  <g id="featured-image">
    <image href="{{propertyImage}}" width="1920" height="650" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="banner-bg">
    <rect x="0" y="0" width="1920" height="380" rx="0" ry="0" fill="#ffffff" />
  </g>
  <g id="accent">
    <rect x="0" y="0" width="20" height="380" rx="0" ry="0" fill="#16a34a" />
  </g>
  <g id="label">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="bold" font-style="normal" fill="#16a34a" text-anchor="start"><tspan x="0" dy="0">OPEN HOUSE</tspan></text>
  </g>
  <g id="date">
    <text y="56" font-family="sans-serif" font-size="56" font-weight="bold" font-style="normal" fill="#1f2937" text-anchor="start"><tspan x="0" dy="0">{{eventDate}}</tspan></text>
  </g>
  <g id="time">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="start"><tspan x="0" dy="0">{{eventTime}}</tspan></text>
  </g>
  <g id="address">
