  </g>
  <g id="alert-bg">
    <rect x="0" y="0" width="900" height="720" rx="0" ry="0" fill="#dc2626" />
  </g>
  <g id="label">
    <text y="56" font-family="sans-serif" font-size="56" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="350" dy="0">PRICE DROP</tspan></text>
  </g>
  <g id="arrow">
