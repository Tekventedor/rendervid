  </g>
  <g id="badge-bg">
    <rect x="0" y="0" width="200" height="60" rx="0" ry="0" fill="#dc2626" />
  </g>
  <g id="badge">
    <text y="24" font-family="sans-serif" font-size="24" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="100" dy="0">{{listingType}}</tspan></text>
  </g>
  <g id="info-bg">
    <rect x="0" y="0" width="1920" height="380" rx="0" ry="0" fill="#ffffff" />
  </g>
  <g id="price">
