    }
    #handle-line {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: handle-line-anim-0 0.5s 1.667s linear 1 normal forwards;
    }
    @keyframes handle-anim-0 {
      0% { opacity: 0; }
