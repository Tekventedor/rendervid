  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1080" height="1080" rx="0" ry="0" fill="{{backgroundColor}}" />
  </g>
  <g id="accent-corner" transform="translate(-100, -100)">
    <ellipse cx="200" cy="200" rx="200" ry="200" fill="{{primaryColor}}" />
  </g>
  <g id="border-top" transform="translate(60, 60)">
    <rect x="0" y="0" width="960" height="4" rx="0" ry="0" fill="{{primaryColor}}" />
  </g>
  <g id="headline" transform="translate(60, 120)">
    <text y="64" font-family="Inter, system-ui, sans-serif" font-size="64" font-weight="bold" font-style="normal" fill="#f8fafc" text-anchor="start"><tspan x="0" dy="0">{{headline}}</tspan></text>
  </g>
  <g id="body" transform="translate(60, 300)">
    <text y="36" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="normal" font-style="normal" fill="#cbd5e1" text-anchor="start"><tspan x="0" dy="0">{{body}}</tspan></text>
  </g>
  <g id="handle-line" transform="translate(60, 960)">
    <rect x="0" y="0" width="40" height="3" rx="0" ry="0" fill="{{primaryColor}}" />
  </g>
  <g id="handle" transform="translate(115, 948)">
    <text y="24" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="500" font-style="normal" fill="#64748b" text-anchor="start"><tspan x="0" dy="0">{{handle}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>