<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <rect width="1080" height="1920" fill="#000000" />
  <defs>
    <linearGradient id="background-grad" x1="100%" y1="50%" x2="0%" y2="50%"><stop offset="0%" stop-color="{{backgroundColor}}" /><stop offset="50%" stop-color="#1a1a1a" /><stop offset="100%" stop-color="{{backgroundColor}}" /></linearGradient>
    <radialGradient id="glow-top-grad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="{{primaryColor}}" /><stop offset="100%" stop-color="transparent" /></radialGradient>
    <radialGradient id="glow-bottom-grad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="{{primaryColor}}" /><stop offset="100%" stop-color="transparent" /></radialGradient>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

