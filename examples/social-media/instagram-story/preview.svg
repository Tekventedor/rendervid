    }
    #cta-text {
      transform-origin: 340px 1665px;
      transform: translate(340px, 1665px);
      opacity: 1;
      visibility: hidden;
      animation: cta-text-anim-0 0.5s 2.167s linear 1 normal forwards, cta-text-vis 3.833s 2.167s 1 linear forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
