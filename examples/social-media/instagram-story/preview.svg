      40% { transform: translate(340px, 1665px); opacity: 0.784; }
      45% { transform: translate(340px, 1665px); opacity: 0.834; }
      50% { transform: translate(340px, 1665px); opacity: 0.875; }
      55% { transform: translate(340px, 1665px); opacity: 0.909; }
      60% { transform: translate(340px, 1665px); opacity: 0.936; }
      65% { transform: translate(340px, 1665px); opacity: 0.957; }
