<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <rect width="1584" height="396" fill="#000000" />
  <defs>
    <linearGradient id="background-grad" x1="50%" y1="100%" x2="50%" y2="0%"><stop offset="0%" stop-color="{{backgroundColor}}" /><stop offset="100%" stop-color="#2d333b" /></linearGradient>
    <linearGradient id="accent-bar-grad" x1="50%" y1="100%" x2="50%" y2="0%"><stop offset="0%" stop-color="{{primaryColor}}" /><stop offset="100%" stop-color="#0077b5" /></linearGradient>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #accent-bar {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #pattern {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.08;
    }
    #company-name {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #tagline {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #cta-bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #cta-text {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1584" height="396" rx="0" ry="0" fill="url(#background-grad)" />
  </g>
  <g id="accent-bar" transform="translate(0, 390)">
    <rect x="0" y="0" width="1584" height="6" rx="0" ry="0" fill="url(#accent-bar-grad)" />
  </g>
  <g id="pattern" transform="translate(1200, -100)">
    <ellipse cx="250" cy="250" rx="250" ry="250" fill="{{primaryColor}}" />
  </g>
  <g id="company-name" transform="translate(80, 100)">
    <text y="52" font-family="Inter, system-ui, sans-serif" font-size="52" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="start"><tspan x="0" dy="0">{{companyName}}</tspan></text>
  </g>
  <g id="tagline" transform="translate(80, 190)">
    <text y="24" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="normal" font-style="normal" fill="#8b949e" text-anchor="start"><tspan x="0" dy="0">{{tagline}}</tspan></text>
  </g>
  <g id="cta-bg" transform="translate(80, 270)">
    <rect x="0" y="0" width="180" height="44" rx="22" ry="22" fill="{{primaryColor}}" />
  </g>
  <g id="cta-text" transform="translate(80, 280)">
    <text y="16" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="90" dy="0">{{ctaText}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>