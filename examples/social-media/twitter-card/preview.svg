<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <rect width="1200" height="628" fill="#000000" />
  <defs>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #pattern-1 {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.1;
    }
    #pattern-2 {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.08;
    }
    #accent-line {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #headline {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #body {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #handle {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1200" height="628" rx="0" ry="0" fill="{{backgroundColor}}" />
  </g>
  <g id="pattern-1" transform="translate(900, -100)">
    <ellipse cx="200" cy="200" rx="200" ry="200" fill="{{primaryColor}}" />
  </g>
  <g id="pattern-2" transform="translate(1000, 350)">
    <ellipse cx="150" cy="150" rx="150" ry="150" fill="{{primaryColor}}" />
  </g>
  <g id="accent-line" transform="translate(60, 120)">
    <rect x="0" y="0" width="60" height="4" rx="0" ry="0" fill="{{primaryColor}}" />
  </g>
  <g id="headline" transform="translate(60, 160)">
    <text y="56" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="bold" font-style="normal" fill="#f7f9f9" text-anchor="start"><tspan x="0" dy="0">{{headline}}</tspan></text>
  </g>
  <g id="body" transform="translate(60, 300)">
    <text y="28" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="normal" font-style="normal" fill="#8b98a5" text-anchor="start"><tspan x="0" dy="0">{{body}}</tspan></text>
  </g>
  <g id="handle" transform="translate(60, 540)">
    <text y="22" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" font-style="normal" fill="{{primaryColor}}" text-anchor="start"><tspan x="0" dy="0">{{handle}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>