<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="100%" style="stop-color:#cc0000"/>
    </linearGradient>
    <filter id="playShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="45" fill="url(#playGrad)" filter="url(#playShadow)"/>
  <!-- Inner circle highlight -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#fff" stroke-width="2" opacity="0.3"/>
  <!-- Play triangle -->
  <polygon points="40,30 40,70 72,50" fill="#fff"/>
</svg>
