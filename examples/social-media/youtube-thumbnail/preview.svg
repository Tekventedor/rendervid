<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <rect width="1280" height="720" fill="#000000" />
  <defs>
    <linearGradient id="background-grad" x1="85.355%" y1="85.355%" x2="14.645%" y2="14.645%"><stop offset="0%" stop-color="{{backgroundColor}}" /><stop offset="100%" stop-color="#27272a" /></linearGradient>
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="{{primaryColor}}" /><stop offset="100%" stop-color="transparent" /></radialGradient>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #background {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #accent-bar {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #glow {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.2;
    }
    #badge-bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #badge-text {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #title {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #subtitle {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #arrow {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="background" transform="translate(0, 0)">
    <rect x="0" y="0" width="1280" height="720" rx="0" ry="0" fill="url(#background-grad)" />
  </g>
  <g id="accent-bar" transform="translate(0, 0)">
    <rect x="0" y="0" width="20" height="720" rx="0" ry="0" fill="{{primaryColor}}" />
  </g>
  <g id="glow" transform="translate(800, 200)">
    <ellipse cx="300" cy="300" rx="300" ry="300" fill="url(#glow-grad)" />
  </g>
  <g id="badge-bg" transform="translate(60, 50)">
    <rect x="0" y="0" width="100" height="40" rx="8" ry="8" fill="{{primaryColor}}" />
  </g>
  <g id="badge-text" transform="translate(60, 58)">
    <text y="18" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="50" dy="0">{{badge}}</tspan></text>
  </g>
  <g id="title" transform="translate(60, 200)">
    <text y="140" font-family="Inter, system-ui, sans-serif" font-size="140" font-weight="800" font-style="normal" fill="#ffffff" text-anchor="start" letter-spacing="-4"><tspan x="0" dy="0">{{title}}</tspan></text>
  </g>
  <g id="subtitle" transform="translate(60, 450)">
    <text y="48" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="500" font-style="normal" fill="#a1a1aa" text-anchor="start"><tspan x="0" dy="0">{{subtitle}}</tspan></text>
  </g>
  <g id="arrow" transform="translate(1100, 300)">
    <text y="120" font-family="sans-serif" font-size="120" font-weight="bold" font-style="normal" fill="{{primaryColor}}" text-anchor="middle"><tspan x="60" dy="0">→</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>