      15% { transform: translate(560px, 1313.255px); opacity: 1; }
      20% { transform: translate(560px, 1202.96px); opacity: 1; }
      25% { transform: translate(560px, 1105.625px); opacity: 1; }
      30% { transform: translate(560px, 1020.44px); opacity: 1; }
      35% { transform: translate(560px, 946.595px); opacity: 1; }
      40% { transform: translate(560px, 883.28px); opacity: 1; }
