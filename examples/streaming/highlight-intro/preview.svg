  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#000000" />
  </g>
  <g id="featured-image">
    <image href="{{gameImage}}" width="1920" height="700" preserveAspectRatio="xMidYMid slice" />
  </g>
  <g id="stripe1">
    <rect x="0" y="0" width="200" height="1280" rx="0" ry="0" fill="#ef4444" />
  </g>
  <g id="stripe2">
    <rect x="0" y="0" width="200" height="1280" rx="0" ry="0" fill="#3b82f6" />
  </g>
  <g id="game">
    <text y="64" font-family="sans-serif" font-size="64" font-weight="bold" font-style="normal" fill="#ef4444" text-anchor="middle"><tspan x="700" dy="0">{{gameTitle}}</tspan></text>
  </g>
  <g id="type">
    <text y="96" font-family="sans-serif" font-size="96" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="700" dy="0">{{highlightType}}</tspan></text>
  </g>
  <g id="player">
    <text y="36" font-family="sans-serif" font-size="36" font-weight="normal" font-style="normal" fill="#a1a1aa" text-anchor="middle"><tspan x="400" dy="0">{{playerName}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
