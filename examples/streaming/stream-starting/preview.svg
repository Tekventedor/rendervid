<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes accent-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #accent {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.3;
      animation: accent-anim-0 1s 0.667s linear 1 normal forwards;
    }
    @keyframes status-anim-0 {
      0% { transform: scale(0, 0); opacity: 0; }
      5% { transform: scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: scale(1, 1); opacity: 1; }
      100% { transform: scale(1, 1); opacity: 1; }
    }
    #status {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: status-anim-0 1s 1s linear 1 normal forwards;
    }
    @keyframes loading-bg-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #loading-bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 0.3;
      animation: loading-bg-anim-0 0.667s 1.667s linear 1 normal forwards;
    }
    @keyframes title-anim-0 {
      0% { transform: translate(0px, 1080px); }
      5% { transform: translate(0px, 925.965px); }
      10% { transform: translate(0px, 787.32px); }
      15% { transform: translate(0px, 663.255px); }
      20% { transform: translate(0px, 552.96px); }
      25% { transform: translate(0px, 455.625px); }
      30% { transform: translate(0px, 370.44px); }
      35% { transform: translate(0px, 296.595px); }
      40% { transform: translate(0px, 233.28px); }
      45% { transform: translate(0px, 179.685px); }
      50% { transform: translate(0px, 135px); }
      55% { transform: translate(0px, 98.415px); }
      60% { transform: translate(0px, 69.12px); }
      65% { transform: translate(0px, 46.305px); }
      70% { transform: translate(0px, 29.16px); }
      75% { transform: translate(0px, 16.875px); }
      80% { transform: translate(0px, 8.64px); }
      85% { transform: translate(0px, 3.645px); }
      90% { transform: translate(0px, 1.08px); }
      95% { transform: translate(0px, 0.135px); }
      100% { transform: translate(0px, 0px); }
    }
    #title {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: title-anim-0 0.833s 2s linear 1 normal forwards;
    }
    @keyframes social-anim-0 {
      0% { opacity: 0; }
      5% { opacity: 0.143; }
      10% { opacity: 0.271; }
      15% { opacity: 0.386; }
      20% { opacity: 0.488; }
      25% { opacity: 0.578; }
      30% { opacity: 0.657; }
      35% { opacity: 0.725; }
      40% { opacity: 0.784; }
      45% { opacity: 0.834; }
      50% { opacity: 0.875; }
      55% { opacity: 0.909; }
      60% { opacity: 0.936; }
      65% { opacity: 0.957; }
      70% { opacity: 0.973; }
      75% { opacity: 0.984; }
      80% { opacity: 0.992; }
      85% { opacity: 0.997; }
      90% { opacity: 0.999; }
      95% { opacity: 1; }
      100% { opacity: 1; }
    }
    #social {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
      animation: social-anim-0 0.833s 2.333s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#0f0f23" />
  </g>
  <g id="accent" transform="translate(0, 900)">
    <rect x="0" y="0" width="1920" height="180" rx="0" ry="0" fill="#7c3aed" />
  </g>
  <g id="status" transform="translate(460, 450)">
    <text y="72" font-family="sans-serif" font-size="72" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="500" dy="0">{{statusText}}</tspan></text>
  </g>
  <g id="loading-bg" transform="translate(560, 600)">
    <rect x="0" y="0" width="800" height="8" rx="0" ry="0" fill="#7c3aed" />
  </g>
  <g id="title" transform="translate(360, 700)">
    <text y="32" font-family="sans-serif" font-size="32" font-weight="normal" font-style="normal" fill="#a78bfa" text-anchor="middle"><tspan x="600" dy="0">{{streamTitle}}</tspan></text>
  </g>
  <g id="social" transform="translate(660, 900)">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="middle"><tspan x="300" dy="0">{{socialHandle}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>