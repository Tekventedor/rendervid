<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#000000" />
  <defs>
    <filter id="watermark-shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)" /></filter>
  </defs>

  <style>
    #bg {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
    @keyframes accent-anim-0 {
      0% { transform: translate(0px, 900px); opacity: 0; }
      5% { transform: translate(0px, 900px); opacity: 0.043; }
      10% { transform: translate(0px, 900px); opacity: 0.081; }
      15% { transform: translate(0px, 900px); opacity: 0.116; }
      20% { transform: translate(0px, 900px); opacity: 0.146; }
      25% { transform: translate(0px, 900px); opacity: 0.173; }
      30% { transform: translate(0px, 900px); opacity: 0.197; }
      35% { transform: translate(0px, 900px); opacity: 0.218; }
      40% { transform: translate(0px, 900px); opacity: 0.235; }
      45% { transform: translate(0px, 900px); opacity: 0.25; }
      50% { transform: translate(0px, 900px); opacity: 0.263; }
      55% { transform: translate(0px, 900px); opacity: 0.273; }
      60% { transform: translate(0px, 900px); opacity: 0.281; }
      65% { transform: translate(0px, 900px); opacity: 0.287; }
      70% { transform: translate(0px, 900px); opacity: 0.292; }
      75% { transform: translate(0px, 900px); opacity: 0.295; }
      80% { transform: translate(0px, 900px); opacity: 0.298; }
      85% { transform: translate(0px, 900px); opacity: 0.299; }
      90% { transform: translate(0px, 900px); opacity: 0.3; }
      95% { transform: translate(0px, 900px); opacity: 0.3; }
      100% { transform: translate(0px, 900px); opacity: 0.3; }
    }
    #accent {
      transform-origin: 0px 900px;
      transform: translate(0px, 900px);
      opacity: 0.3;
      animation: accent-anim-0 1s 0.667s linear 1 normal forwards;
    }
    @keyframes status-anim-0 {
      0% { transform: translate(460px, 450px) scale(0, 0); opacity: 0; }
      5% { transform: translate(460px, 450px) scale(0.143, 0.143); opacity: 0.143; }
      10% { transform: translate(460px, 450px) scale(0.271, 0.271); opacity: 0.271; }
      15% { transform: translate(460px, 450px) scale(0.386, 0.386); opacity: 0.386; }
      20% { transform: translate(460px, 450px) scale(0.488, 0.488); opacity: 0.488; }
      25% { transform: translate(460px, 450px) scale(0.578, 0.578); opacity: 0.578; }
      30% { transform: translate(460px, 450px) scale(0.657, 0.657); opacity: 0.657; }
      35% { transform: translate(460px, 450px) scale(0.725, 0.725); opacity: 0.725; }
      40% { transform: translate(460px, 450px) scale(0.784, 0.784); opacity: 0.784; }
      45% { transform: translate(460px, 450px) scale(0.834, 0.834); opacity: 0.834; }
      50% { transform: translate(460px, 450px) scale(0.875, 0.875); opacity: 0.875; }
      55% { transform: translate(460px, 450px) scale(0.909, 0.909); opacity: 0.909; }
      60% { transform: translate(460px, 450px) scale(0.936, 0.936); opacity: 0.936; }
      65% { transform: translate(460px, 450px) scale(0.957, 0.957); opacity: 0.957; }
      70% { transform: translate(460px, 450px) scale(0.973, 0.973); opacity: 0.973; }
      75% { transform: translate(460px, 450px) scale(0.984, 0.984); opacity: 0.984; }
      80% { transform: translate(460px, 450px) scale(0.992, 0.992); opacity: 0.992; }
      85% { transform: translate(460px, 450px) scale(0.997, 0.997); opacity: 0.997; }
      90% { transform: translate(460px, 450px) scale(0.999, 0.999); opacity: 0.999; }
      95% { transform: translate(460px, 450px) scale(1, 1); opacity: 1; }
      100% { transform: translate(460px, 450px); opacity: 1; }
    }
    #status {
      transform-origin: 460px 450px;
      transform: translate(460px, 450px);
      opacity: 1;
      animation: status-anim-0 1s 1s linear 1 normal forwards;
    }
    @keyframes loading-bg-anim-0 {
      0% { transform: translate(560px, 600px); opacity: 0; }
      5% { transform: translate(560px, 600px); opacity: 0.043; }
      10% { transform: translate(560px, 600px); opacity: 0.081; }
      15% { transform: translate(560px, 600px); opacity: 0.116; }
      20% { transform: translate(560px, 600px); opacity: 0.146; }
      25% { transform: translate(560px, 600px); opacity: 0.173; }
      30% { transform: translate(560px, 600px); opacity: 0.197; }
      35% { transform: translate(560px, 600px); opacity: 0.218; }
      40% { transform: translate(560px, 600px); opacity: 0.235; }
      45% { transform: translate(560px, 600px); opacity: 0.25; }
      50% { transform: translate(560px, 600px); opacity: 0.263; }
      55% { transform: translate(560px, 600px); opacity: 0.273; }
      60% { transform: translate(560px, 600px); opacity: 0.281; }
      65% { transform: translate(560px, 600px); opacity: 0.287; }
      70% { transform: translate(560px, 600px); opacity: 0.292; }
      75% { transform: translate(560px, 600px); opacity: 0.295; }
      80% { transform: translate(560px, 600px); opacity: 0.298; }
      85% { transform: translate(560px, 600px); opacity: 0.299; }
      90% { transform: translate(560px, 600px); opacity: 0.3; }
      95% { transform: translate(560px, 600px); opacity: 0.3; }
      100% { transform: translate(560px, 600px); opacity: 0.3; }
    }
    #loading-bg {
      transform-origin: 560px 600px;
      transform: translate(560px, 600px);
      opacity: 0.3;
      animation: loading-bg-anim-0 0.667s 1.667s linear 1 normal forwards;
    }
    @keyframes title-anim-0 {
      0% { transform: translate(360px, 1780px); opacity: 1; }
      5% { transform: translate(360px, 1625.965px); opacity: 1; }
      10% { transform: translate(360px, 1487.32px); opacity: 1; }
      15% { transform: translate(360px, 1363.255px); opacity: 1; }
      20% { transform: translate(360px, 1252.96px); opacity: 1; }
      25% { transform: translate(360px, 1155.625px); opacity: 1; }
      30% { transform: translate(360px, 1070.44px); opacity: 1; }
      35% { transform: translate(360px, 996.595px); opacity: 1; }
      40% { transform: translate(360px, 933.28px); opacity: 1; }
      45% { transform: translate(360px, 879.685px); opacity: 1; }
      50% { transform: translate(360px, 835px); opacity: 1; }
      55% { transform: translate(360px, 798.415px); opacity: 1; }
      60% { transform: translate(360px, 769.12px); opacity: 1; }
      65% { transform: translate(360px, 746.305px); opacity: 1; }
      70% { transform: translate(360px, 729.16px); opacity: 1; }
      75% { transform: translate(360px, 716.875px); opacity: 1; }
      80% { transform: translate(360px, 708.64px); opacity: 1; }
      85% { transform: translate(360px, 703.645px); opacity: 1; }
      90% { transform: translate(360px, 701.08px); opacity: 1; }
      95% { transform: translate(360px, 700.135px); opacity: 1; }
      100% { transform: translate(360px, 700px); opacity: 1; }
    }
    #title {
      transform-origin: 360px 700px;
      transform: translate(360px, 700px);
      opacity: 1;
      animation: title-anim-0 0.833s 2s linear 1 normal forwards;
    }
    @keyframes social-anim-0 {
      0% { transform: translate(660px, 900px); opacity: 0; }
      5% { transform: translate(660px, 900px); opacity: 0.143; }
      10% { transform: translate(660px, 900px); opacity: 0.271; }
      15% { transform: translate(660px, 900px); opacity: 0.386; }
      20% { transform: translate(660px, 900px); opacity: 0.488; }
      25% { transform: translate(660px, 900px); opacity: 0.578; }
      30% { transform: translate(660px, 900px); opacity: 0.657; }
      35% { transform: translate(660px, 900px); opacity: 0.725; }
      40% { transform: translate(660px, 900px); opacity: 0.784; }
      45% { transform: translate(660px, 900px); opacity: 0.834; }
      50% { transform: translate(660px, 900px); opacity: 0.875; }
      55% { transform: translate(660px, 900px); opacity: 0.909; }
      60% { transform: translate(660px, 900px); opacity: 0.936; }
      65% { transform: translate(660px, 900px); opacity: 0.957; }
      70% { transform: translate(660px, 900px); opacity: 0.973; }
      75% { transform: translate(660px, 900px); opacity: 0.984; }
      80% { transform: translate(660px, 900px); opacity: 0.992; }
      85% { transform: translate(660px, 900px); opacity: 0.997; }
      90% { transform: translate(660px, 900px); opacity: 0.999; }
      95% { transform: translate(660px, 900px); opacity: 1; }
      100% { transform: translate(660px, 900px); opacity: 1; }
    }
    #social {
      transform-origin: 660px 900px;
      transform: translate(660px, 900px);
      opacity: 1;
      animation: social-anim-0 0.833s 2.333s linear 1 normal forwards;
    }
    #watermark {
      transform-origin: 0px 0px;
      transform: none;
      opacity: 1;
    }
  </style>

  <g id="bg" transform="translate(0, 0)">
    <rect x="0" y="0" width="1920" height="1080" rx="0" ry="0" fill="#0f0f23" />
  </g>
  <g id="accent">
    <rect x="0" y="0" width="1920" height="180" rx="0" ry="0" fill="#7c3aed" />
  </g>
  <g id="status">
    <text y="72" font-family="sans-serif" font-size="72" font-weight="bold" font-style="normal" fill="#ffffff" text-anchor="middle"><tspan x="500" dy="0">{{statusText}}</tspan></text>
  </g>
  <g id="loading-bg">
    <rect x="0" y="0" width="800" height="8" rx="0" ry="0" fill="#7c3aed" />
  </g>
  <g id="title">
    <text y="32" font-family="sans-serif" font-size="32" font-weight="normal" font-style="normal" fill="#a78bfa" text-anchor="middle"><tspan x="600" dy="0">{{streamTitle}}</tspan></text>
  </g>
  <g id="social">
    <text y="28" font-family="sans-serif" font-size="28" font-weight="normal" font-style="normal" fill="#6b7280" text-anchor="middle"><tspan x="300" dy="0">{{socialHandle}}</tspan></text>
  </g>
  <g id="watermark" transform="translate(1520, 20)">
    <text y="16" font-family="sans-serif" font-size="16" font-weight="600" font-style="normal" fill="#ffffff" text-anchor="end" filter="url(#watermark-shadow)"><tspan x="380" dy="0">RenderVid by</tspan><tspan x="380" dy="20.8">FlowHunt.io</tspan></text>
  </g>
</svg>