name = "rendervid-worker"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Account ID (set via environment or wrangler config)
# account_id = "your-account-id"

# R2 bucket binding
[[r2_buckets]]
binding = "RENDER_BUCKET"
bucket_name = "rendervid-renders"

# Queue producer binding
[[queues.producers]]
binding = "RENDER_QUEUE"
queue = "rendervid-chunks"

# Queue consumer
[[queues.consumers]]
queue = "rendervid-chunks"
max_batch_size = 5
max_batch_timeout = 10
max_retries = 3

# Durable Object binding
[durable_objects]
bindings = [
  { name = "JOB_COORDINATOR", class_name = "JobCoordinator" }
]

# Durable Object migrations
[[migrations]]
tag = "v1"
new_classes = ["JobCoordinator"]

# Environment variables
[vars]
# API_TOKEN = "set-via-wrangler-secret"

# Build configuration
[build]
command = "npm run build"

# Limits (paid Workers plan recommended for video rendering)
[limits]
cpu_ms = 30000
